
substitutions:
  thermostat_ui_desktop_timeout_enabled: 'false'
  thermostat_ui_desktop_timeout_duration: '6s'
  thermostat_ui_target_cooling: '0'
  thermostat_ui_target_heating: '1'
  thermostat_ui_startup_page: loading_page

esphome:
  includes:
    - include/thermostat_slider_state.h
    - include/thermostat_ui_animation.h
  platformio_options:
    build_flags:
      - "-DTHERMOSTAT_MIN_TEMP=${thermostat_min_temp}f"
      - "-DTHERMOSTAT_MAX_TEMP=${thermostat_max_temp}f"
      - "-DTHERMOSTAT_TEMP_STEP=${thermostat_temp_step}f"
      - "-DTHERMOSTAT_IDEAL_TEMP=${thermostat_display_ideal_temp}f"
      - "-DTHERMOSTAT_HEAT_OVERRUN=${thermostat_heat_overrun}f"
      - "-DTHERMOSTAT_COOL_OVERRUN=${thermostat_cool_overrun}f"
  on_boot:
    - priority: -100.0
      then:
        - lvgl.page.show: ${thermostat_ui_startup_page}
        - script.execute: run_desktop_loading_timeout
        - script.execute: sync_active_setpoint_visuals

globals:
  - id: current_temperature
    type: float
    initial_value: '21.0'
  - id: is_dragging
    type: bool
    initial_value: 'false'
  - id: cooling_setpoint_temp
    type: float
    initial_value: '24.0'
  - id: heating_setpoint_temp
    type: float
    initial_value: '21.0'
  - id: track_y_position
    type: int
    initial_value: '680'
  - id: active_setpoint_target
    type: int
    initial_value: '${thermostat_ui_target_heating}'
  - id: last_touch_y
    type: int
    initial_value: '255'
  - id: pending_drag_active
    type: bool
    initial_value: 'false'
  - id: pending_drag_start_y
    type: int
    initial_value: '0'
  - id: slider_track_height
    type: int
    initial_value: '600'
  - id: slider_label_y
    type: int
    initial_value: '496'
  - id: load_timeout_enabled
    type: bool
    initial_value: '${thermostat_ui_desktop_timeout_enabled}'
  - id: load_timeout_triggered
    type: bool
    initial_value: 'false'
  - id: data_weather_condition_ready
    type: bool
    initial_value: 'false'
  - id: data_weather_temperature_ready
    type: bool
    initial_value: 'false'
  - id: data_room_name_ready
    type: bool
    initial_value: 'false'
  - id: data_room_temperature_ready
    type: bool
    initial_value: 'false'
  - id: data_target_high_ready
    type: bool
    initial_value: 'false'
  - id: data_target_low_ready
    type: bool
    initial_value: 'false'
  - id: data_fan_mode_ready
    type: bool
    initial_value: 'false'
  - id: fan_is_running
    type: bool
    initial_value: 'false'
  - id: fan_animation_active
    type: bool
    initial_value: 'false'
  - id: ui_ready
    type: bool
    initial_value: 'false'
  - id: suppress_setpoint_animation
    type: bool
    initial_value: 'false'
  - id: bird_alert_flash_state
    type: bool
    initial_value: 'false'
  - id: data_hvac_status_ready
    type: bool
    initial_value: 'false'
script:
  - id: commit_setpoints
    mode: restart
    then:
      - delay: 300ms
      - if:
          condition:
            lambda: |-
              const float new_high = id(cooling_setpoint_temp);
              const float new_low = id(heating_setpoint_temp);
              const float ha_high = id(target_high).state;
              const float ha_low = id(target_low).state;
              if (std::isnan(ha_high) || fabsf(ha_high - new_high) > 0.049f) {
                return true;
              }
              if (std::isnan(ha_low) || fabsf(ha_low - new_low) > 0.049f) {
                return true;
              }
              return false;
          then:
            - logger.log:
                level: INFO
                format: "Setting HVAC targets: high=%.1f low=%.1f"
                args: [ 'id(cooling_setpoint_temp)', 'id(heating_setpoint_temp)' ]
            - homeassistant.service:
                service: climate.set_temperature
                data:
                  entity_id: climate.thermostat_climate_ctrl_climate_control
                  target_temp_high: !lambda 'return id(cooling_setpoint_temp);'
                  target_temp_low: !lambda 'return id(heating_setpoint_temp);'
  - id: refresh_setpoint_labels
    mode: restart
    then:
      - lvgl.label.update:
          id: cooling_setpoint
          text: !lambda |-
            const float value = id(cooling_setpoint_temp);
            const int tenths = static_cast<int>(std::round(value * 10.0f));
            const int whole = tenths / 10;
            char buffer[8];
            snprintf(buffer, sizeof(buffer), "%d°", whole);
            return std::string(buffer);
      - lvgl.label.update:
          id: cooling_setpoint_fraction
          text: !lambda |-
            const float value = id(cooling_setpoint_temp);
            const int tenths = static_cast<int>(std::round(value * 10.0f));
            int fractional = tenths % 10;
            if (fractional < 0) fractional = -fractional;
            char buffer[8];
            snprintf(buffer, sizeof(buffer), ".%d", fractional);
            return std::string(buffer);
      - lvgl.label.update:
          id: heating_setpoint
          text: !lambda |-
            const float value = id(heating_setpoint_temp);
            const int tenths = static_cast<int>(std::round(value * 10.0f));
            const int whole = tenths / 10;
            char buffer[8];
            snprintf(buffer, sizeof(buffer), "%d°", whole);
            return std::string(buffer);
      - lvgl.label.update:
          id: heating_setpoint_fraction
          text: !lambda |-
            const float value = id(heating_setpoint_temp);
            const int tenths = static_cast<int>(std::round(value * 10.0f));
            int fractional = tenths % 10;
            if (fractional < 0) fractional = -fractional;
            char buffer[8];
            snprintf(buffer, sizeof(buffer), ".%d", fractional);
            return std::string(buffer);
  - id: update_mode_icon
    then:
      - lvgl.image.update:
          id: mode_icon
          src: !lambda |-
            const bool heating_active = id(active_setpoint_target) == ${thermostat_ui_target_heating};
            return heating_active ? id(fire) : id(snowflake);
  - id: start_fan_animation
    then:
      - lambda: |-
          if (id(fan_animation_active)) {
            return;
          }
          if (id(fan_anim) == nullptr) {
            ESP_LOGW("fan", "fan_anim not ready; skipping animation start");
            return;
          }
          id(fan_animation_active) = true;
      - lvgl.animimg.start: fan_anim
  - id: stop_fan_animation
    then:
      - lambda: |-
          if (!id(fan_animation_active)) {
            return;
          }
          if (id(fan_anim) == nullptr) {
            return;
          }
      - lvgl.animimg.stop: fan_anim
      - lambda: |-
          id(fan_animation_active) = false;
  - id: update_fan_animation
    then:
      - if:
          condition:
            lambda: 'return id(fan_is_running);'
          then:
            - script.execute: start_fan_animation
          else:
            - script.execute: stop_fan_animation
  - id: debug_force_main_page
    mode: single
    then:
      - lvgl.page.show: main_page
      - light.turn_on: display_backlight
      - script.execute: debug_dump_ui_state
  - id: debug_dump_ui_state
    mode: single
    then:
      - lambda: |-
          auto *disp = lv_disp_get_default();
          const uint32_t inactive_ms = lv_disp_get_inactive_time(disp);
          ESP_LOGI("ui-debug", "inactive_ms=%lu ui_ready=%d load_timeout_triggered=%d",
                   static_cast<unsigned long>(inactive_ms),
                   id(ui_ready),
                   id(load_timeout_triggered));
          ESP_LOGI("ui-debug", "data readiness: weather_cond=%d weather_temp=%d room_name=%d room_temp=%d target_high=%d target_low=%d fan_mode=%d hvac_status=%d",
                   id(data_weather_condition_ready),
                   id(data_weather_temperature_ready),
                   id(data_room_name_ready),
                   id(data_room_temperature_ready),
                   id(data_target_high_ready),
                   id(data_target_low_ready),
                   id(data_fan_mode_ready),
                   id(data_hvac_status_ready));
          lv_obj_t *active = lv_disp_get_scr_act(disp);
          ESP_LOGI("ui-debug", "active_screen=%p", static_cast<void *>(active));
          auto log_obj = [](const char *name, lv_obj_t *obj) {
            if (!obj) {
              ESP_LOGW("ui-debug", "%s missing", name);
              return;
            }
            int16_t x = lv_obj_get_x(obj);
            int16_t y = lv_obj_get_y(obj);
            lv_coord_t w = lv_obj_get_width(obj);
            lv_coord_t h = lv_obj_get_height(obj);
            uint8_t opa = lv_obj_get_style_opa(obj, LV_PART_MAIN);
            lv_color_t bg = lv_obj_get_style_bg_color(obj, LV_PART_MAIN);
            uint32_t bg_hex = lv_color_to32(bg);
            ESP_LOGI("ui-debug", "%s: pos=(%d,%d) size=%dx%d opa=%u bg=0x%06X",
                     name, x, y, w, h, opa, bg_hex & 0xFFFFFF);
          };
          log_obj("temperature_track", id(temperature_track));
          log_obj("setpoint_group", id(setpoint_group));
          log_obj("action_bar", id(action_bar));
          log_obj("weather_group", id(weather_group));
          log_obj("hvac_status_group", id(hvac_status_group));
          log_obj("room_group", id(room_group));
          const char *cool_text = id(cooling_setpoint) ? lv_label_get_text(id(cooling_setpoint)) : "<null>";
          const char *heat_text = id(heating_setpoint) ? lv_label_get_text(id(heating_setpoint)) : "<null>";
          ESP_LOGI("ui-debug", "setpoints cooling=%s heating=%s track_y=%d track_height=%d label_y=%d",
                   cool_text,
                   heat_text,
                   id(track_y_position),
                   id(slider_track_height),
                   id(slider_label_y));
  - id: show_bird_alert
    mode: single
    then:
      - lvgl.page.show: bird_alert_page
      - delay: 4500ms
      - lvgl.page.show: main_page
  - id: sync_active_setpoint_visuals
    mode: restart
    then:
      - lambda: |-
          const bool heating_active = id(active_setpoint_target) == ${thermostat_ui_target_heating};
          const float target_temp = heating_active ? id(heating_setpoint_temp) : id(cooling_setpoint_temp);
          auto state = thermostat::slider::compute_state_from_temperature(target_temp);

          lv_obj_t *track = id(temperature_track);
          lv_obj_t *group = id(setpoint_group);

          const int32_t start_y = lv_obj_get_y(track);
          const int32_t start_height = lv_obj_get_height(track);
          const int32_t start_label_y = lv_obj_get_y(group);

          id(track_y_position) = state.track_y;
          id(slider_track_height) = state.track_height;
          id(slider_label_y) = state.label_y;
          id(last_touch_y) = state.track_y;

          const bool animate = !id(is_dragging) && !id(suppress_setpoint_animation);

          lv_anim_del(track, nullptr);
          lv_anim_del(group, nullptr);

          if (animate) {
            lv_anim_t anim_y;
            lv_anim_init(&anim_y);
            lv_anim_set_var(&anim_y, track);
            lv_anim_set_values(&anim_y, start_y, state.track_y);
            lv_anim_set_time(&anim_y, 120);
            lv_anim_set_path_cb(&anim_y, lv_anim_path_ease_in_out);
            lv_anim_set_exec_cb(&anim_y, [](void *obj, int32_t value) {
              lv_obj_set_y(static_cast<lv_obj_t *>(obj), value);
            });
            lv_anim_start(&anim_y);

            lv_anim_t anim_height;
            lv_anim_init(&anim_height);
            lv_anim_set_var(&anim_height, track);
            lv_anim_set_values(&anim_height, start_height, state.track_height);
            lv_anim_set_time(&anim_height, 120);
            lv_anim_set_path_cb(&anim_height, lv_anim_path_ease_in_out);
            lv_anim_set_exec_cb(&anim_height, [](void *obj, int32_t value) {
              lv_obj_set_height(static_cast<lv_obj_t *>(obj), value);
            });
            lv_anim_start(&anim_height);

            lv_anim_t anim_label;
            lv_anim_init(&anim_label);
            lv_anim_set_var(&anim_label, group);
            lv_anim_set_values(&anim_label, start_label_y, state.label_y);
            lv_anim_set_time(&anim_label, 120);
            lv_anim_set_path_cb(&anim_label, lv_anim_path_ease_in_out);
            lv_anim_set_exec_cb(&anim_label, [](void *obj, int32_t value) {
              lv_obj_set_y(static_cast<lv_obj_t *>(obj), value);
            });
            lv_anim_start(&anim_label);
          } else {
            lv_obj_set_y(track, state.track_y);
            lv_obj_set_height(track, state.track_height);
            lv_obj_set_y(group, state.label_y);
          }
          id(suppress_setpoint_animation) = false;
      - lvgl.widget.update:
          id: temperature_track
          bg_color: !lambda |-
            return id(active_setpoint_target) == ${thermostat_ui_target_heating}
                       ? lv_color_hex(0xe1752e)
                       : lv_color_hex(0x2776cc);
      - lvgl.widget.update:
          id: cooling_setpoint
          text_color: !lambda |-
            return id(active_setpoint_target) == ${thermostat_ui_target_cooling}
                       ? lv_color_hex(0x2776cc)
                       : lv_color_hex(0x292929);
      - lvgl.widget.update:
          id: cooling_setpoint_fraction
          text_color: !lambda |-
            return id(active_setpoint_target) == ${thermostat_ui_target_cooling}
                       ? lv_color_hex(0x2776cc)
                       : lv_color_hex(0x292929);
      - lvgl.widget.update:
          id: heating_setpoint
          text_color: !lambda |-
            return id(active_setpoint_target) == ${thermostat_ui_target_heating}
                       ? lv_color_hex(0xe1752e)
                       : lv_color_hex(0x292929);
      - lvgl.widget.update:
          id: heating_setpoint_fraction
          text_color: !lambda |-
            return id(active_setpoint_target) == ${thermostat_ui_target_heating}
                       ? lv_color_hex(0xe1752e)
                       : lv_color_hex(0x292929);
      - lambda: |-
          // Keep the setpoint text behind the track to let the bar trim any overlap.
          lv_obj_move_background(id(setpoint_group));
          lv_obj_move_background(id(track_touch_zone));
      - script.execute: refresh_setpoint_labels
      - script.execute: update_mode_icon
      - script.execute: update_fan_animation
  - id: select_setpoint_target
    mode: restart
    parameters:
      target: int
    then:
      - lambda: |-
          if (id(is_dragging)) {
            ESP_LOGD("target", "Ignoring selection while dragging");
            return;
          }
          if (id(active_setpoint_target) == target) {
            return;
          }

          const int old_target = id(active_setpoint_target);
          const bool new_heating = target == ${thermostat_ui_target_heating};
          const float target_temp = new_heating ? id(heating_setpoint_temp) : id(cooling_setpoint_temp);
          auto new_state = thermostat::slider::compute_state_from_temperature(target_temp);

          id(active_setpoint_target) = target;
          id(track_y_position) = new_state.track_y;
          id(slider_track_height) = new_state.track_height;
          id(slider_label_y) = new_state.label_y;
          id(last_touch_y) = new_state.track_y;

          lv_obj_t *track = id(temperature_track);
          lv_obj_t *group = id(setpoint_group);
          const int32_t start_y = lv_obj_get_y(track);
          const int32_t start_height = lv_obj_get_height(track);
          const int32_t start_label_y = lv_obj_get_y(group);

          lv_anim_del(track, nullptr);
          lv_anim_del(id(cooling_setpoint), nullptr);
          lv_anim_del(id(heating_setpoint), nullptr);

          if (!id(suppress_setpoint_animation)) {
            lv_anim_t anim_y;
            lv_anim_init(&anim_y);
            lv_anim_set_var(&anim_y, track);
            lv_anim_set_values(&anim_y, start_y, new_state.track_y);
            lv_anim_set_time(&anim_y, 120);
            lv_anim_set_path_cb(&anim_y, lv_anim_path_ease_in_out);
            lv_anim_set_exec_cb(&anim_y, [](void *obj, int32_t value) {
              lv_obj_set_y(static_cast<lv_obj_t *>(obj), value);
            });
            lv_anim_start(&anim_y);

            lv_anim_t anim_height;
            lv_anim_init(&anim_height);
            lv_anim_set_var(&anim_height, track);
            lv_anim_set_values(&anim_height, start_height, new_state.track_height);
            lv_anim_set_time(&anim_height, 120);
            lv_anim_set_path_cb(&anim_height, lv_anim_path_ease_in_out);
            lv_anim_set_exec_cb(&anim_height, [](void *obj, int32_t value) {
              lv_obj_set_height(static_cast<lv_obj_t *>(obj), value);
            });
            lv_anim_start(&anim_height);

            lv_anim_t anim_label;
            lv_anim_init(&anim_label);
            lv_anim_set_var(&anim_label, group);
            lv_anim_set_values(&anim_label, start_label_y, new_state.label_y);
            lv_anim_set_time(&anim_label, 120);
            lv_anim_set_path_cb(&anim_label, lv_anim_path_ease_in_out);
            lv_anim_set_exec_cb(&anim_label, [](void *obj, int32_t value) {
              lv_obj_set_y(static_cast<lv_obj_t *>(obj), value);
            });
            lv_anim_start(&anim_label);
          } else {
            lv_obj_set_y(track, new_state.track_y);
            lv_obj_set_height(track, new_state.track_height);
            lv_obj_set_y(group, new_state.label_y);
          }

          id(suppress_setpoint_animation) = false;

          const uint32_t neutral_color = 0x303030;
          const uint32_t track_start_color = (old_target == ${thermostat_ui_target_heating}) ? 0xe1752e : 0x2776cc;
          const uint32_t track_end_color = new_heating ? 0xe1752e : 0x2776cc;
          thermostat::ui::animate_two_stage_color(track, track_start_color, neutral_color, track_end_color, 60, false);

          const uint32_t cooling_start_color = (old_target == ${thermostat_ui_target_cooling}) ? 0x2776cc : 0x292929;
          const uint32_t heating_start_color = (old_target == ${thermostat_ui_target_heating}) ? 0xe1752e : 0x292929;
          const uint32_t cooling_end_color = (target == ${thermostat_ui_target_cooling}) ? 0x2776cc : 0x292929;
          const uint32_t heating_end_color = (target == ${thermostat_ui_target_heating}) ? 0xe1752e : 0x292929;
          thermostat::ui::animate_two_stage_color(id(cooling_setpoint), cooling_start_color, neutral_color, cooling_end_color, 60, true);
          thermostat::ui::animate_two_stage_color(id(cooling_setpoint_fraction), cooling_start_color, neutral_color, cooling_end_color, 60, true);
          thermostat::ui::animate_two_stage_color(id(heating_setpoint), heating_start_color, neutral_color, heating_end_color, 60, true);
          thermostat::ui::animate_two_stage_color(id(heating_setpoint_fraction), heating_start_color, neutral_color, heating_end_color, 60, true);
      - script.execute: refresh_setpoint_labels
      - script.execute: update_mode_icon
  - id: prime_drag_from_touch
    mode: restart
    then:
      - lambda: |-
          auto touch = id(${thermostat_touchscreen_id});
          if (touch == nullptr) {
            ESP_LOGW("touch", "Touchscreen ID ${thermostat_touchscreen_id} not found");
            id(pending_drag_active) = false;
            return;
          }

          auto touch_point = touch->get_touch();
          if (!touch_point.has_value()) {
            ESP_LOGW("touch", "No touch point available on press (prime)");
            id(pending_drag_active) = false;
            return;
          }

          auto point = touch_point.value();
          if (point.state != esphome::touchscreen::STATE_PRESSED &&
              point.state != esphome::touchscreen::STATE_UPDATED) {
            ESP_LOGD("touch", "Prime ignoring non-pressed state=%d", point.state);
            id(pending_drag_active) = false;
            return;
          }

          int raw_y = point.y;
          if (raw_y < -100 || raw_y > 600) {
            ESP_LOGW("touch", "Ignoring out-of-range prime y=%d", raw_y);
            id(pending_drag_active) = false;
            return;
          }

          id(pending_drag_active) = true;
          id(pending_drag_start_y) = raw_y;
  - id: begin_drag_from_touch
    mode: restart
    then:
      - lambda: |-
          id(pending_drag_active) = false;
          auto touch = id(${thermostat_touchscreen_id});
          if (touch == nullptr) {
            ESP_LOGW("touch", "Touchscreen ID ${thermostat_touchscreen_id} not found");
            id(is_dragging) = false;
            return;
          }

          auto touch_point = touch->get_touch();
          if (!touch_point.has_value()) {
            ESP_LOGW("touch", "No touch point available on press");
            id(is_dragging) = false;
            return;
          }

          auto point = touch_point.value();
          if (point.state != esphome::touchscreen::STATE_PRESSED &&
              point.state != esphome::touchscreen::STATE_UPDATED) {
            ESP_LOGD("touch", "Begin drag ignoring non-pressed state=%d", point.state);
            id(is_dragging) = false;
            return;
          }

          int raw_y = point.y;
          if (raw_y < -100 || raw_y > 600) {
            ESP_LOGW("touch", "Ignoring out-of-range press y=%d", raw_y);
            id(is_dragging) = false;
            return;
          }

          int clamped_y = raw_y;
          const int min_y = thermostat::slider::track_min_y();
          const int max_y = thermostat::slider::track_max_y();
          if (clamped_y < min_y) clamped_y = min_y;
          if (clamped_y > max_y) clamped_y = max_y;

          auto state = thermostat::slider::compute_state_from_y(clamped_y);
          float adjusted = state.setpoint;
          if (id(active_setpoint_target) == ${thermostat_ui_target_heating}) {
            adjusted = thermostat::slider::clamp_heating(adjusted, id(cooling_setpoint_temp));
          } else {
            adjusted = thermostat::slider::clamp_cooling(adjusted, id(heating_setpoint_temp));
          }
          auto clamped_state = thermostat::slider::compute_state_from_temperature(adjusted);

          id(track_y_position) = clamped_state.track_y;
          id(last_touch_y) = clamped_state.track_y;
          id(slider_track_height) = clamped_state.track_height;
          id(slider_label_y) = clamped_state.label_y;
          if (id(active_setpoint_target) == ${thermostat_ui_target_heating}) {
            id(heating_setpoint_temp) = clamped_state.setpoint;
          } else {
            id(cooling_setpoint_temp) = clamped_state.setpoint;
          }

          id(is_dragging) = true;
          ESP_LOGD("touch", "Begin drag: raw_y=%d, clamped_y=%d, temp=%.1f", raw_y, clamped_state.track_y, clamped_state.setpoint);
      - lvgl.widget.update:
          id: temperature_track
          y: !lambda return id(track_y_position);
          height: !lambda return id(slider_track_height);
      - lvgl.widget.update:
          id: setpoint_group
          y: !lambda return id(slider_label_y);
      - script.execute: refresh_setpoint_labels
      - script.execute: update_mode_icon
      - script.execute: update_fan_animation
  - id: run_desktop_loading_timeout
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(load_timeout_enabled) && !id(load_timeout_triggered);
          then:
            - logger.log:
                level: DEBUG
                format: "[loading] Desktop timeout armed for ${thermostat_ui_desktop_timeout_duration}"
            - delay: ${thermostat_ui_desktop_timeout_duration}
            - if:
                condition:
                  lambda: |-
                    return !id(ui_ready);
                then:
                  - logger.log:
                      level: DEBUG
                      format: "[loading] Desktop timeout fired; forcing main page"
                  - lvgl.page.show: main_page
            - globals.set:
                id: load_timeout_triggered
                value: 'true'
            - logger.log:
                level: DEBUG
                format: "[loading] Desktop timeout completed (ui_ready=%d)"
                args:
                  - 'id(ui_ready)'
          else:
            - logger.log:
                level: DEBUG
                format: "[loading] Desktop timeout skipped (enabled=%d triggered=%d)"
                args:
                  - 'id(load_timeout_enabled)'
                  - 'id(load_timeout_triggered)'
  - id: update_loading_state
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return id(data_weather_condition_ready) &&
                     id(data_weather_temperature_ready) &&
                     id(data_room_name_ready) &&
                     id(data_room_temperature_ready) &&
                     id(data_target_high_ready) &&
                     id(data_target_low_ready) &&
                     id(data_fan_mode_ready) &&
                     id(data_hvac_status_ready);
          then:
            - if:
                condition:
                  lambda: |-
                    return !id(ui_ready);
                then:
                  - logger.log:
                      level: DEBUG
                      format: "[loading] All required data received; showing main page"
                  - globals.set:
                      id: ui_ready
                      value: 'true'
                  - script.execute: sync_active_setpoint_visuals
                  - lvgl.page.show: main_page
            - lvgl.label.update:
                id: loading_status_text
                text: ""
          else:
            - logger.log:
                level: DEBUG
                format: "[loading] Waiting for data (weather_cond=%d weather_temp=%d room_name=%d room_temp=%d target_high=%d target_low=%d fan_mode=%d hvac_status=%d timeout_enabled=%d timeout_triggered=%d)"
                args:
                  - 'id(data_weather_condition_ready)'
                  - 'id(data_weather_temperature_ready)'
                  - 'id(data_room_name_ready)'
                  - 'id(data_room_temperature_ready)'
                  - 'id(data_target_high_ready)'
                  - 'id(data_target_low_ready)'
                  - 'id(data_fan_mode_ready)'
                  - 'id(data_hvac_status_ready)'
                  - 'id(load_timeout_enabled)'
                  - 'id(load_timeout_triggered)'
            - lvgl.label.update:
                id: loading_status_text
                text: !lambda |-
                  const int total = 8;
                  int ready = (id(data_weather_condition_ready) ? 1 : 0) +
                              (id(data_weather_temperature_ready) ? 1 : 0) +
                              (id(data_room_name_ready) ? 1 : 0) +
                              (id(data_room_temperature_ready) ? 1 : 0) +
                              (id(data_target_high_ready) ? 1 : 0) +
                              (id(data_target_low_ready) ? 1 : 0) +
                              (id(data_fan_mode_ready) ? 1 : 0) +
                              (id(data_hvac_status_ready) ? 1 : 0);
                  std::string message = esphome::str_sprintf("Waiting for data %d/%d", ready, total);
                  std::string missing;
                  auto append = [&](const char *label) {
                    if (!missing.empty()) missing += ", ";
                    missing += label;
                  };
                  if (!id(data_weather_condition_ready) || !id(data_weather_temperature_ready)) append("weather");
                  if (!id(data_room_name_ready) || !id(data_room_temperature_ready)) append("room");
                  if (!id(data_target_high_ready) || !id(data_target_low_ready)) append("target temps");
                  if (!id(data_fan_mode_ready)) append("fan mode");
                  if (!id(data_hvac_status_ready)) append("hvac status");
                  if (!missing.empty()) {
                    message += "\nMissing: ";
                    message += missing;
                  }
                  return message;
            - if:
                condition:
                  lambda: |-
                    return id(ui_ready);
                then:
                  - globals.set:
                      id: ui_ready
                      value: 'false'
                  - lvgl.page.show: loading_page


button:
  - platform: template
    name: "${friendly_name} UI Diagnostics"
    id: button_debug_ui
    entity_category: diagnostic
    icon: mdi:magnify
    on_press:
      then:
        - script.execute: debug_force_main_page

interval:
  - interval: 32ms
    then:
      - if:
          condition:
            lambda: |-
              static bool last_dragging = false;
              bool current_dragging = id(is_dragging);
              bool pending = id(pending_drag_active);
              bool active = current_dragging || pending;
              if (current_dragging != last_dragging) {
                ESP_LOGD("drag", "Dragging state changed: %s", current_dragging ? "STARTED" : "STOPPED");
                last_dragging = current_dragging;
              }
              if (pending && !current_dragging) {
                ESP_LOGD("drag", "Pending drag active");
              }
              return active;
          then:
            - lambda: |-
                auto touch = id(${thermostat_touchscreen_id});
                if (touch == nullptr) {
                  if (id(pending_drag_active)) {
                    id(pending_drag_active) = false;
                  }
                  return;
                }
                auto touch_point = touch->get_touch();
                if (touch_point.has_value()) {
                  auto point = touch_point.value();
                  if (point.state != esphome::touchscreen::STATE_PRESSED &&
                      point.state != esphome::touchscreen::STATE_UPDATED) {
                    if (id(pending_drag_active)) {
                      ESP_LOGD("drag", "Touch reported state=%d; cancelling pending", point.state);
                      id(pending_drag_active) = false;
                    }
                    return;
                  }

                  int raw_y = point.y;
                  if (raw_y < -100 || raw_y > 600) {
                    ESP_LOGD("drag", "Ignoring out-of-range sample: raw_y=%d", raw_y);
                    if (id(pending_drag_active)) {
                      id(pending_drag_active) = false;
                    }
                    return;
                  }
                  if (id(pending_drag_active)) {
                    int delta = raw_y - id(pending_drag_start_y);
                    if (abs(delta) >= 4) {
                      ESP_LOGD("drag", "Promoting pending drag (delta=%d)", delta);
                      id(pending_drag_active) = false;
                      id(begin_drag_from_touch).execute();
                    }
                    return;
                  }
                  auto state = thermostat::slider::compute_state_from_y(raw_y);
                  float adjusted = state.setpoint;
                  if (id(active_setpoint_target) == ${thermostat_ui_target_heating}) {
                    adjusted = thermostat::slider::clamp_heating(adjusted, id(cooling_setpoint_temp));
                  } else {
                    adjusted = thermostat::slider::clamp_cooling(adjusted, id(heating_setpoint_temp));
                  }
                  auto clamped_state = thermostat::slider::compute_state_from_temperature(adjusted);

                  int previous_y = id(track_y_position);
                  int delta_y = clamped_state.track_y - previous_y;
                  if (abs(delta_y) > 1) {
                    ESP_LOGD("drag", "Dragging: raw_y=%d, clamped_y=%d, delta=%d", raw_y, clamped_state.track_y, delta_y);
                  }

                  id(track_y_position) = clamped_state.track_y;
                  id(last_touch_y) = clamped_state.track_y;
                  id(slider_track_height) = clamped_state.track_height;
                  id(slider_label_y) = clamped_state.label_y;
                  if (id(active_setpoint_target) == ${thermostat_ui_target_heating}) {
                    id(heating_setpoint_temp) = clamped_state.setpoint;
                  } else {
                    id(cooling_setpoint_temp) = clamped_state.setpoint;
                  }

                  ESP_LOGD("temp", "Track y=%d, Temperature=%.1f", clamped_state.track_y, clamped_state.setpoint);
                } else {
                  if (id(pending_drag_active)) {
                    ESP_LOGD("drag", "Touch lost while pending; cancelling");
                    id(pending_drag_active) = false;
                  }
                }
            - lvgl.widget.update:
                id: temperature_track
                y: !lambda return id(track_y_position);
                height: !lambda return id(slider_track_height);
            - lvgl.widget.update:
                id: setpoint_group
                y: !lambda return id(slider_label_y);
            - script.execute: refresh_setpoint_labels
  - interval: 750ms
    then:
      - lambda: |-
          id(bird_alert_flash_state) = !id(bird_alert_flash_state);
      - lvgl.widget.update:
          id: bird_alert_page
          # TODO: Change these colors
          bg_color: !lambda |-
            return id(bird_alert_flash_state) ? lv_color_hex(0xff0000) : lv_color_hex(0x000000);
      - lvgl.label.update:
          id: bird_alert_label
          text_color: !lambda |-
            return id(bird_alert_flash_state) ? lv_color_hex(0x000000) : lv_color_hex(0xffffff);
