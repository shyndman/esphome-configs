lvgl:
  displays:
    - ${thermostat_display_id}
  touchscreens:
    - touchscreen_id: ${thermostat_touchscreen_id}
  buffer_size: 100%
  byte_order: little_endian

  style_definitions:
    - id: warming_color
      bg_color: 0xe1752e
    - id: cooling_color
      bg_color: 0x2776cc
    - id: transition_neutral_color
      bg_color: 0x5A5A5A
      text_color: 0x5A5A5A
    - id: top_bar_color
      text_color: 0xc0c0c0
    - id: icon_bar_color
      text_color: 0xdadada
    - id: blurred_temp_color
      text_color: 0x737373
    - id: action_icon_style
      pad_all: 12
      radius: 8
    - id: setpoint_primary_label
      text_font: setpoint_primary_font
      height: SIZE_CONTENT
    - id: setpoint_secondary_label
      text_font: setpoint_secondary_font
      pad_bottom: 4
      translate_y: -13

  theme:
    obj:
      pad_all: 0
      pad_row: 0
      pad_column: 0
      scrollable: false
      scrollbar_mode: 'off'
    label:
      pad_all: 0
    image:
      pad_all: 0

  pages:
    - id: loading_page
      bg_color: 0x000000
      scrollable: false
      scrollbar_mode: 'off'
      widgets:
        - obj:
            align: center
            width: 440
            height: 450
            x: 0
            bg_opa: 0
            border_width: 0
            scrollable: false
            scrollbar_mode: 'off'
            layout:
              type: flex
              flex_flow: column
              flex_align_main: center
              flex_align_cross: center
              pad_row: 0
              pad_column: 0
            widgets:
              - image:
                  id: loading_connection_icon
                  src: loading_connection
                  pad_bottom: 8
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
              - image:
                  id: loading_home_icon
                  src: loading_home
                  pad_bottom: 24
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
              - label:
                  id: loading_status_text
                  text: "Waiting for data..."
                  width: 100%
                  text_font: top_bar_room
                  text_color: 0xdadada
                  text_align: center
                  long_mode: WRAP
    - id: main_page
      bg_color: 0x000000
      scrollable: false
      scrollbar_mode: 'off'
      widgets:
        - obj:
            id: top_bar
            x: 0
            y: 0
            width: 100%
            height: 64
            bg_opa: 0
            border_width: 0
            pad_top: 12
            pad_left: 40
            pad_right: 40
            scrollable: false
            scrollbar_mode: 'off'
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
              pad_row: 0
              pad_column: 0
            widgets:
              - obj:
                  id: weather_group
                  bg_opa: 0
                  border_width: 0
                  flex_grow: 1
                  pad_right: 12
                  height: SIZE_CONTENT
                  scrollbar_mode: 'off'
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: center
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    - image:
                        id: weather_icon
                        src: sunny
                        image_recolor: 0xa0a0a0
                        image_recolor_opa: 100%
                        pad_right: 4
                        opa: 0
                    - label:
                        id: weather_temp
                        text: ""
                        text_font: top_bar_weather
                        text_color: 0xa0a0a0
                        opa: 0
                        pad_left: 8
              - obj:
                  id: hvac_status_group
                  bg_opa: 0
                  border_width: 0
                  flex_grow: 1
                  height: SIZE_CONTENT
                  pad_top: 5
                  scrollbar_mode: 'off'
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: center
                    flex_align_cross: center
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    - label:
                        id: hvac_status_label
                        text: ""
                        text_font: hvac_status_font
                        text_align: center
                        opa: 0
              - obj:
                  id: room_group
                  bg_opa: 0
                  border_width: 0
                  flex_grow: 1
                  y: 1
                  pad_left: 10
                  height: SIZE_CONTENT
                  scrollbar_mode: 'off'
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: end
                    flex_align_cross: center
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    - label:
                        id: room_temp
                        text: ""
                        text_font: top_bar_temp
                        text_color: 0xa0a0a0
                        opa: 0
                        pad_right: 8
                    - image:
                        id: room_icon
                        src: room_default
                        image_recolor: 0xa0a0a0
                        image_recolor_opa: 100%
                        opa: 0
                        pad_left: 8
                        y: 1
        - obj:
            id: setpoint_group
            bg_opa: 0
            outline_color: 0xffffff
            border_width: 0
            border_opa: 100%
            y: !lambda return id(slider_label_y);
            width: 100%
            height: 122
            pad_left: 38
            pad_right: 38
            scrollable: false
            scrollbar_mode: 'off'
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_between
              pad_row: 0
              pad_column: 0
            widgets:
              - obj:
                  id: cooling_setpoint_container
                  bg_opa: 0
                  outline_color: 0xff0000
                  border_width: 0
                  border_opa: 100%
                  scrollable: false
                  scrollbar_mode: 'off'
                  flex_grow: 1
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: end
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    - label:
                        id: cooling_setpoint
                        text: "24°"
                        text_color: 0x292929
                        styles: setpoint_primary_label
                        outline_color: 0x00ff00
                        border_width: 0
                        border_opa: 100%
                        scrollable: false
                        long_mode: CLIP
                        clickable: true
                        on_press:
                          then:
                            - globals.set:
                                id: suppress_setpoint_animation
                                value: 'true'
                            - script.execute:
                                id: select_setpoint_target
                                target: ${thermostat_ui_target_cooling}
                            - script.execute: prime_drag_from_touch
                        on_release:
                          then:
                            - globals.set:
                                id: pending_drag_active
                                value: 'false'
                            - globals.set:
                                id: is_dragging
                                value: 'false'
                            - script.execute: commit_setpoints
                    - label:
                        id: cooling_setpoint_fraction
                        text: ".0"
                        text_color: 0x292929
                        styles: setpoint_secondary_label
                        # The left setpoint (which is left aligned) has its
                        # fractional value shifted left to sit underneath the
                        # degree symbol. We do the same to the right setpoint,
                        # but we shift the whole-number value right, because it
                        # is right aligned and we don't want the fractional
                        # value contributing to layout.
                        translate_x: -29
                        outline_color: 0x0000ff
                        border_width: 0
                        border_opa: 100%
                        scrollable: false
                        long_mode: CLIP
                        clickable: true
                        on_press:
                          then:
                            - globals.set:
                                id: suppress_setpoint_animation
                                value: 'true'
                            - script.execute:
                                id: select_setpoint_target
                                target: ${thermostat_ui_target_cooling}
                            - script.execute: prime_drag_from_touch
                        on_release:
                          then:
                            - globals.set:
                                id: pending_drag_active
                                value: 'false'
                            - globals.set:
                                id: is_dragging
                                value: 'false'
                            - script.execute: commit_setpoints
              - obj:
                  id: heating_setpoint_container
                  bg_opa: 0
                  outline_color: 0xff00ff
                  border_width: 0
                  border_opa: 100%
                  text_align: right
                  scrollable: false
                  scrollbar_mode: 'off'
                  flex_grow: 1
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: end
                    flex_align_cross: end
                    pad_row: 0
                    pad_column: 0
                  widgets:
                    - label:
                        id: heating_setpoint
                        text: "21°"
                        text_color: 0xe1752e
                        text_align: right
                        styles: setpoint_primary_label
                        translate_x: 29
                        outline_color: 0x00ffff
                        border_width: 0
                        border_opa: 100%
                        height: SIZE_CONTENT
                        scrollable: false
                        long_mode: CLIP
                        clickable: true
                        on_press:
                          then:
                            - globals.set:
                                id: suppress_setpoint_animation
                                value: 'true'
                            - script.execute:
                                id: select_setpoint_target
                                target: ${thermostat_ui_target_heating}
                            - script.execute: prime_drag_from_touch
                        on_release:
                          then:
                            - globals.set:
                                id: pending_drag_active
                                value: 'false'
                            - globals.set:
                                id: is_dragging
                                value: 'false'
                            - script.execute: commit_setpoints
                    - label:
                        id: heating_setpoint_fraction
                        text: ".0"
                        text_color: 0xe1752e
                        styles: setpoint_secondary_label
                        outline_color: 0xffff00
                        border_width: 0
                        border_opa: 100%
                        scrollable: false
                        long_mode: CLIP
                        clickable: true
                        on_press:
                          then:
                            - globals.set:
                                id: suppress_setpoint_animation
                                value: 'true'
                            - script.execute:
                                id: select_setpoint_target
                                target: ${thermostat_ui_target_heating}
                            - script.execute: prime_drag_from_touch
                        on_release:
                          then:
                            - globals.set:
                                id: pending_drag_active
                                value: 'false'
                            - globals.set:
                                id: is_dragging
                                value: 'false'
                            - script.execute: commit_setpoints
        - obj:
            id: temperature_track
            x: 0
            y: !lambda return id(track_y_position);
            width: 100%
            height: !lambda return id(slider_track_height);
            bg_color: 0xe1752e
            border_width: 0
            radius: 0
            scrollbar_mode: 'off'
            clickable: false
            gesture_bubble: true
        # - obj:
        #     id: slider_bound_top
        #     x: 0
        #     y: !lambda return thermostat::slider::track_min_y();
        #     width: 100%
        #     height: 1
        #     bg_color: 0xff0000
        #     bg_opa: 80%
        #     clickable: false
        #     scrollbar_mode: 'off'
        # - obj:
        #     id: slider_bound_bottom
        #     x: 0
        #     y: !lambda return thermostat::slider::track_max_y();
        #     width: 100%
        #     height: 1
        #     bg_color: 0x00ff00
        #     bg_opa: 80%
        #     clickable: false
        #     scrollbar_mode: 'off'
        - obj:
            id: track_touch_zone
            x: 0
            y: 120
            width: 100%
            height: 1160
            bg_opa: 0
            border_width: 0
            clickable: true
            scrollbar_mode: 'off'
            on_press:
              then:
                - logger.log:
                    level: DEBUG
                    format: "Touch zone pressed!"
                - script.execute: begin_drag_from_touch
            on_release:
              then:
                - logger.log:
                    level: DEBUG
                    format: "Touch zone released!"
                - globals.set:
                    id: is_dragging
                    value: 'false'
                - script.execute: commit_setpoints
        - obj:
            id: action_bar
            x: 0
            y: 1120
            width: 100%
            height: SIZE_CONTENT
            bg_opa: 0
            border_width: 0
            scrollable: false
            scrollbar_mode: 'off'
            pad_left: 80
            pad_right: 80
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_between
              flex_align_cross: center
              pad_row: 0
              pad_column: 0
            widgets:
              - image:
                  id: mode_icon
                  src: snowflake
                  clickable: true
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
                  styles: action_icon_style
                  pressed:
                    bg_color: 0xffffff
                    bg_opa: 15%
              - image:
                  id: power_icon
                  src: power
                  clickable: true
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
                  styles: action_icon_style
                  pressed:
                    bg_color: 0xffffff
                    bg_opa: 15%
              - animimg:
                  id: fan_anim
                  src: [fan_frame_0, fan_frame_12, fan_frame_24, fan_frame_36, fan_frame_48, fan_frame_60, fan_frame_72, fan_frame_84, fan_frame_96, fan_frame_108, fan_frame_120, fan_frame_132, fan_frame_144, fan_frame_156, fan_frame_168, fan_frame_180, fan_frame_192, fan_frame_204, fan_frame_216, fan_frame_228, fan_frame_240, fan_frame_252, fan_frame_264, fan_frame_276, fan_frame_288, fan_frame_300, fan_frame_312, fan_frame_324, fan_frame_336, fan_frame_348, fan_frame_360]
                  duration: 1000ms
                  repeat_count: forever
                  auto_start: false
                  clickable: true
                  styles: action_icon_style
                  pressed:
                    bg_color: 0xffffff
                    bg_opa: 15%
    - id: bird_alert_page
      bg_color: 0xff0000
      scrollable: false
      scrollbar_mode: 'off'
      widgets:
        - label:
            id: bird_alert_label
            text: "Bird Alert"
            align: center
            # TODO This font is not big enough
            text_font: setpoint_primary_font
            text_color: 0x000000
        - obj:
            id: bird_alert_touch_overlay
            x: 0
            y: 0
            width: 100%
            height: 100%
            bg_opa: 0
            border_width: 0
            clickable: true
            scrollbar_mode: 'off'
            on_press:
              then:
                - script.stop: show_bird_alert
                - lvgl.page.show: main_page
    - id: nerd_mode_page
      bg_color: 0x000000
      scrollable: false
      scrollbar_mode: 'off'
      widgets:
        - label:
            text: "Nerd Mode"
            align: center
            text_font: setpoint_primary_font
            text_color: 0xffffff
