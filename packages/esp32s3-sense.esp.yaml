substitutions:
  # Camera FPS controls (override per-device as needed)
  camera_max_fps: "6.0"
  camera_overheat_fps: "1.0"
  # Overheat thresholds (°C)
  camera_overheat_threshold_c: "70.0"
  camera_resume_threshold_c: "65.0"

esphome:
  platformio_options:
    build_flags:
      - -DBOARD_HAS_PSRAM
      - -Iinclude
    board_build.f_flash: 80000000L
    board_build.flash_mode: dio
  includes:
    - include/esp32_camera_sensor_helpers.h
  on_boot:
    priority: -80
    then:
      - wait_until:
          condition:
            lambda: |-
              auto *cam = id(espcam);
              return cam != nullptr && cam->is_ready();
      - lambda: |-
          auto *cam = id(espcam);
          if (id(camera_brightness).has_state()) {
            cam->set_brightness((int) id(camera_brightness).state);
          }
          if (id(camera_contrast).has_state()) {
            cam->set_contrast((int) id(camera_contrast).state);
          }
          if (id(camera_saturation).has_state()) {
            cam->set_saturation((int) id(camera_saturation).state);
          }
          if (id(camera_ae_level).has_state()) {
            cam->set_ae_level((int) id(camera_ae_level).state);
          }
          if (id(camera_jpeg_quality).has_state()) {
            cam->set_jpeg_quality((int) id(camera_jpeg_quality).state);
          }
          if (id(camera_max_fps).has_state()) {
            const float fps = id(camera_max_fps).state;
            if (fps > 0.0f) {
              const uint32_t interval = (uint32_t) (1000.0f / fps);
              cam->set_max_update_interval(interval);
            }
          }
          const bool aec2_state = id(camera_aec2).has_state() ? id(camera_aec2).state : true;
          cam->set_aec2(aec2_state);
          cam->update_camera_parameters();
          if (id(camera_jpeg_quality).has_state()) {
            espcam_helpers::set_quality((int) id(camera_jpeg_quality).state);
          }
          if (id(camera_sharpness).has_state()) {
            espcam_helpers::set_sharpness((int) id(camera_sharpness).state);
          }
          const bool denoise_state = id(camera_denoise).has_state() ? id(camera_denoise).state : false;
          espcam_helpers::set_denoise(denoise_state);
          const bool raw_gma_state = id(camera_raw_gma).has_state() ? id(camera_raw_gma).state : false;
          espcam_helpers::set_raw_gma(raw_gma_state);
          const bool dcw_state = id(camera_dcw).has_state() ? id(camera_dcw).state : false;
          espcam_helpers::set_dcw(dcw_state);
          const bool awb_gain_state = id(camera_awb_gain).has_state() ? id(camera_awb_gain).state : false;
          espcam_helpers::set_awb_gain(awb_gain_state);

light:
  - platform: status_led
    id: status_light
    name: "Status LED"
    pin:
      number: 21
      inverted: true

esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240MHz
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_LWIP_MAX_SOCKETS: '16'

psram:
  mode: octal
  speed: 80MHz

i2c:
  - id: bus_i2c
    sda: 8
    scl: 7
    scan: true
    frequency: 400kHz
  - id: camera_i2c
    sda: 40
    scl: 39
    scan: true

esp32_camera:
  id: espcam
  name: Camera
  internal: true
  # Physical config
  external_clock:
    pin: 10
    frequency: 20MHz
  i2c_id: camera_i2c
  data_pins: [15, 17, 18, 16, 14, 12, 11, 48]
  vsync_pin: 38
  href_pin: 47
  pixel_clock_pin: 13
  # Camera config
  resolution: 1024x768
  jpeg_quality: 10
  idle_framerate: 0.2fps
  max_framerate: ${camera_max_fps}fps
  wb_mode: OFFICE # white balance
  agc_mode: auto # automatic gain
  agc_gain_ceiling: 16x
  aec_mode: auto # automatic exposure control
  ae_level: 2 # auto exposure level
  aec2: true  # automatic exposure
  horizontal_mirror: false

esp32_camera_web_server:
  - port: 8080
    mode: stream
  # - port: 8081
  #   mode: snapshot

number:
  - platform: template
    name: "Cam: Brightness"
    id: camera_brightness
    min_value: -2
    max_value: 2
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: mdi:brightness-6
    entity_category: config
    on_value:
      then:
        - lambda: |-
            auto *cam = id(espcam);
            cam->set_brightness((int) x);
            if (!cam->is_ready()) {
              return;
            }
            cam->update_camera_parameters();
  - platform: template
    name: "Cam: Contrast"
    id: camera_contrast
    min_value: -2
    max_value: 2
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: mdi:contrast-box
    entity_category: config
    on_value:
      then:
        - lambda: |-
            auto *cam = id(espcam);
            cam->set_contrast((int) x);
            if (!cam->is_ready()) {
              return;
            }
            cam->update_camera_parameters();
  - platform: template
    name: "Cam: Saturation"
    id: camera_saturation
    min_value: -2
    max_value: 2
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: mdi:palette
    entity_category: config
    on_value:
      then:
        - lambda: |-
            auto *cam = id(espcam);
            cam->set_saturation((int) x);
            if (!cam->is_ready()) {
              return;
            }
            cam->update_camera_parameters();
  - platform: template
    name: "Cam: Sharpness"
    id: camera_sharpness
    min_value: -2
    max_value: 2
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: mdi:image-filter-center-focus-strong
    entity_category: config
    on_value:
      then:
        - lambda: |-
            espcam_helpers::set_sharpness((int) x);
  - platform: template
    name: "Cam: AE Level"
    id: camera_ae_level
    min_value: -2
    max_value: 2
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 1
    icon: mdi:chart-bell-curve-cumulative
    entity_category: config
    on_value:
      then:
        - lambda: |-
            auto *cam = id(espcam);
            cam->set_ae_level((int) x);
            if (!cam->is_ready()) {
              return;
            }
            cam->update_camera_parameters();
  - platform: template
    name: "Cam: JPEG Quality"
    id: camera_jpeg_quality
    min_value: 10
    max_value: 63
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 14
    unit_of_measurement: "Q"
    icon: mdi:format-vertical-align-center
    entity_category: config
    on_value:
      then:
        - lambda: |-
            auto *cam = id(espcam);
            const int quality = (int) x;
            cam->set_jpeg_quality(quality);
            espcam_helpers::set_quality(quality);
  - platform: template
    name: "Cam: Max FPS"
    id: camera_max_fps
    min_value: 0.5
    max_value: 15.0
    step: 0.5
    optimistic: true
    restore_value: true
    initial_value: ${camera_max_fps}
    unit_of_measurement: "fps"
    icon: mdi:video
    entity_category: config
    on_value:
      then:
        - lambda: |-
            if (x > 0.0f) {
              const uint32_t interval = (uint32_t) (1000.0f / x);
              id(espcam).set_max_update_interval(interval);
            }

switch:
  - platform: template
    name: "Cam: AEC2"
    id: camera_aec2
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    icon: mdi:chip
    entity_category: config
    turn_on_action:
      - lambda: |-
          auto *cam = id(espcam);
          cam->set_aec2(true);
          if (!cam->is_ready()) {
            return;
          }
          cam->update_camera_parameters();
    turn_off_action:
      - lambda: |-
          auto *cam = id(espcam);
          cam->set_aec2(false);
          if (!cam->is_ready()) {
            return;
          }
          cam->update_camera_parameters();
  - platform: template
    name: "Cam: Denoise"
    id: camera_denoise
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:wave
    entity_category: config
    turn_on_action:
        - lambda: |-
            espcam_helpers::set_denoise(true);
    turn_off_action:
        - lambda: |-
            espcam_helpers::set_denoise(false);
  - platform: template
    name: "Cam: Raw GMA"
    id: camera_raw_gma
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:chart-bell-curve
    entity_category: config
    turn_on_action:
        - lambda: |-
            espcam_helpers::set_raw_gma(true);
    turn_off_action:
        - lambda: |-
            espcam_helpers::set_raw_gma(false);
  - platform: template
    name: "Cam: DCW"
    id: camera_dcw
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:image-filter-hdr
    entity_category: config
    turn_on_action:
        - lambda: |-
            espcam_helpers::set_dcw(true);
    turn_off_action:
        - lambda: |-
            espcam_helpers::set_dcw(false);
  - platform: template
    name: "Cam: AWB Gain"
    id: camera_awb_gain
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:chart-line-variant
    entity_category: config
    turn_on_action:
        - lambda: |-
            espcam_helpers::set_awb_gain(true);
    turn_off_action:
        - lambda: |-
            espcam_helpers::set_awb_gain(false);

binary_sensor:
  # Camera Overheat Protection
  #
  # CRITICAL: This thermal protection was implemented after multiple ESP32-S3 Sense
  # devices failed due to overheating caused by continuous camera operation at high
  # frame rates. DO NOT REMOVE without careful consideration.
  #
  # How it works:
  # - Monitors ESP32 internal temperature sensor continuously
  # - Uses hysteresis (latching) to prevent rapid on/off cycling:
  #   * Triggers at 70°C (camera_overheat_threshold_c) - reduces FPS to 1.0
  #   * Releases at 65°C (camera_resume_threshold_c) - restores normal FPS
  # - The 5°C hysteresis gap ensures stable operation during temperature fluctuations
  #
  # When overheating occurs:
  # - Camera framerate is immediately throttled to 1.0 fps (camera_overheat_fps)
  # - This dramatically reduces processing load and heat generation
  # - Device remains functional but with minimal camera activity
  #
  # When temperature recovers:
  # - Normal framerate is restored from the camera_max_fps setting
  # - Allows device to return to full performance once safe
  #
  # Thresholds can be adjusted via substitutions at the top of this file if needed
  # for different environmental conditions or use cases.
  - platform: template
    name: Camera Overheat
    id: camera_overheat
    device_class: heat
    lambda: |-
      if (!id(esp_internal_temp).has_state()) return false;
      const float t = id(esp_internal_temp).state;
      static bool latched = false;
      if (latched) {
        if (t <= ${camera_resume_threshold_c}) latched = false; // cooled sufficiently
      } else {
        if (t >= ${camera_overheat_threshold_c}) latched = true; // overheated
      }
      return latched;
    on_press:
      then:
        - logger.log:
            format: "Camera overheat detected (%.1f°C). Limiting camera to %.2f fps."
            args: [ 'id(esp_internal_temp).state', '(float) ${camera_overheat_fps}' ]
        - lambda: |-
            const float fps = ${camera_overheat_fps};
            if (fps > 0.0f) {
              const uint32_t ms = (uint32_t)(1000.0f / fps);
              id(espcam).set_max_update_interval(ms);
            }
    on_release:
      then:
        - logger.log:
            format: "Camera temperature recovered (%.1f°C). Restoring previous camera framerate."
            args: [ 'id(esp_internal_temp).state' ]
        - lambda: |-
            if (id(camera_max_fps).has_state()) {
              const float fps = id(camera_max_fps).state;
              if (fps > 0.0f) {
                const uint32_t ms = (uint32_t)(1000.0f / fps);
                id(espcam).set_max_update_interval(ms);
              }
            }

# Configuration for I2S audio
i2s_audio:
  - id: transcription_i2s
    i2s_lrclk_pin: 46
    i2s_bclk_pin: 42

# Configuration for the microphone using I2S audio
microphone:
  - id: transcription_mic
    platform: i2s_audio
    i2s_audio_id: transcription_i2s
    i2s_din_pin: 41
    adc_type: external
    sample_rate: 16000
    bits_per_sample: 16bit
    pdm: true
    channel: left
