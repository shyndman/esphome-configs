# ESP-IDF compatible media player that rides on the existing speaker stack.
# Requires packages/esp32-p4-nano/audio.esp.yaml to be included first.

substitutions:
  p4_media_player_id: p4_speaker_media_player

media_player:
  - platform: speaker
    id: ${p4_media_player_id}
    name: "Speaker"
    announcement_pipeline:
      speaker: ${p4_announcement_resampler_id}
      format: WAV
      num_channels: 1
    media_pipeline:
      speaker: ${p4_media_resampler_id}
      format: FLAC
      num_channels: 1
    codec_support_enabled: true
    buffer_size: 750000
    files:
      - id: song
        file: assets/song.flac
    volume_increment: 2%

button:
  - platform: template
    name: "Play Media File"
    on_press:
      - media_player.speaker.play_on_device_media_file:
          media_file: song
          announcement: false
