# Home Assistant media player bridge for the Waveshare ESP32-P4-NANO audio stack.
# Requires packages/esp32-p4-nano/audio.esp.yaml to be included first.

substitutions:
  p4_media_player_id: p4_media_player
  p4_audio_bus_id: p4_i2s_audio_bus

media_player:
  - platform: i2s_audio
    id: ${p4_media_player_id}
    name: "${friendly_name} Speaker"
    i2s_audio_id: ${p4_audio_bus_id}
    dac_type: external
    i2s_dout_pin: 11
    mode: mono
