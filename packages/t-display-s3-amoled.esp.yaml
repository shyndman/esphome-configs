esphome:
  platformio_options:
    build_flags: -DBOARD_HAS_PSRAM
    board_build.f_flash: 80000000L
    board_build.flash_mode: dio
    build_unflags: -Werror=all
    upload_speed: 921600

esp32:
  board: esp32-s3-devkitc-1
  # partitions: /config/include/partitions_16MB.csv
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y

psram:
  mode: octal
  speed: 80000000.0

i2c:
  - sda: 3
    scl: 2
    scan: True

spi:
  - id: quad_spi
    type: quad
    clk_pin: 47
    data_pins:
      - 18
      - 7
      - 48
      - 5

# uart:
#   id: stemma_uart
#   tx_pin: 43
#   rx_pin: 44

touchscreen:
  - platform: cst816
    id: main_display_touch
    interrupt_pin:
      number: 21
    on_touch:
      - lambda: |-
          ESP_LOGI("cal", "x=%d, y=%d, x_raw=%d, y_raw=%0d",
              touch.x,
              touch.y,
              touch.x_raw,
              touch.y_raw
              );

display:
  - platform: qspi_dbi
    model: RM67162
    id: main_display
    cs_pin: 6
    reset_pin: 17
    enable_pin: 38
    dimensions:
      height: 240
      width: 536
    color_order: rgb
    brightness: 255
    auto_clear_enabled: False

binary_sensor:
  - platform: cst816
    name: "Home Button Pressed"
    id: home_pressed

switch:
  - platform: template
    name: Display On?
    id: is_display_on
    restore_mode: ALWAYS_ON
    optimistic: True
    on_turn_on:
      then:
        - lambda: |-
            id(main_display).set_brightness(255);
    on_turn_off:
      then:
        - lambda: |-
            id(main_display).set_brightness(0);
