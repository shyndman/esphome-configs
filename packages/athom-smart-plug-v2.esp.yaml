defaults:
  power_sensor_update_frequency: 15s

esp8266:
  board: esp8285
  restore_from_flash: true
  early_pin_init: false

preferences:
  flash_write_interval: 4min

logger:
  baud_rate: 0

uart:
  rx_pin: RX
  baud_rate: 4800
  parity: EVEN

globals:
  - id: total_energy
    type: float
    restore_value: yes
    initial_value: '0.0'

button:
  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: config

binary_sensor:
  - platform: gpio
    name: "Power Button"
    pin:
      number: 5
      mode: INPUT_PULLUP
      inverted: true
    disabled_by_default: true
    on_multi_click:
      - timing:
        - ON for at most 1s
        - OFF for at least 0.2s
        then:
          - switch.toggle: relay
      - timing:
        - ON for at least 4s
        then:
          - button.press: Reset

sensor:
  - platform: cse7766
    current:
      name: "Current"
      filters:
        - throttle_average: ${power_sensor_update_frequency}
        - lambda: if (x < 0.060) return 0.0; else return x;   #For the chip will report less than 3w power when no load is connected

    voltage:
      name: "Voltage"
      filters:
        - throttle_average: ${power_sensor_update_frequency}

    power:
      name: "Power"
      id: power_sensor
      filters:
        - throttle_average: ${power_sensor_update_frequency}
        - lambda: if (x < 3.0) return 0.0; else return x;    #For the chip will report less than 3w power when no load is connected

    energy:
      name: "Energy"
      id: energy
      unit_of_measurement: kWh
      filters:
        - throttle: ${power_sensor_update_frequency}
        # Multiplication factor from W to kW is 0.001
        - multiply: 0.001
      on_value:
        then:
          - lambda: |-
              static float previous_energy_value = 0.0;
              float current_energy_value = id(energy).state;
              id(total_energy) += current_energy_value - previous_energy_value;
              previous_energy_value = current_energy_value;
              id(total_energy_sensor).update();

    apparent_power:
      name: "Apparent Power"
      filters:
        - throttle_average: ${power_sensor_update_frequency}

    power_factor:
      name: "Power Factor"
      filters:
        - throttle_average: ${power_sensor_update_frequency}

  - platform: total_daily_energy #(Optional, not specific to cse7766)
    name: Daily Energy
    power_id: power_sensor
    icon: mdi:hours-24
    accuracy_decimals: 3

  - platform: template
    name: "Total Energy"
    id: total_energy_sensor
    unit_of_measurement: kWh
    device_class: "energy"
    state_class: "total_increasing"
    icon: "mdi:lightning-bolt"
    accuracy_decimals: 3
    lambda: |-
      return id(total_energy);
    update_interval: 15s

  - platform: total_daily_energy
    name: "Total Energy Since Boot"
    restore: true
    power_id: power_sensor
    unit_of_measurement: kWh
    icon: mdi:history
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

switch:
  - platform: gpio
    id: relay
    name: "Switch"
    pin: 12
    restore_mode: RESTORE_DEFAULT_ON

light:
  - platform: status_led
    name: "Status LED"
    id: blue_led
    disabled_by_default: true
    pin:
      number: 13
      inverted: true
