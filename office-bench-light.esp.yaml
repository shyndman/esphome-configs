substitutions:
  friendly_name: Office Bench Light
  name: office_bench_light

packages:
  esp32-base: !include packages/esp32-base.esp.yaml

preferences:
  flash_write_interval: 30s

external_components:
- source: # github://shyndman/esphome-neewer-ble@v1.1.0-shyndman
    type: local
    path: /home/shyndman/dev/projects/esphome-neewer-ble/components
  components: [ neewerlight_ble, neewerlight ]

esphome:
  platformio_options:
    build_flags: -DBOARD_HAS_PSRAM
    board_build.f_flash: 80000000L
    board_build.flash_mode: dio
    build_unflags: -Werror=all
    upload_speed: 921600

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  cpu_frequency: 80MHZ
  framework:
    type: esp-idf

api:
  reboot_timeout: 0s

logger:
  level: DEBUG

ble_client:
- mac_address: F8:0C:31:D6:74:8C
  id: nw_rgb62

light:
- platform: neewerlight
  restore_mode: RESTORE_DEFAULT_OFF
  name: "RGB Light"
  ble_client_id: nw_rgb62
  model: rgb62
  gamma_correct: 1.0
  default_transition_length: 0s
#  model: rgb62
