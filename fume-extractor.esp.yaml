substitutions:
  friendly_name: Fume Extractor
  name: fume_extractor

packages:
  esp32-base: !include packages/esp32-base.esp.yaml
  bme68x: !include
    file: packages/bme68x.esp.yaml
    vars:
      bme68x_i2c_id: bme688_bus
      bme68x_address: "0x77"
      bme68x_model: BME688

esphome:
  platformio_options:
    build_unflags: -Werror=all
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
    upload_speed: 921600

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y

psram:
  mode: octal
  speed: 80MHz

external_components:
  - source: github://shyndman/personal-esphome-components/
    components: [bme68x_bsec2]
  - source:
      type: local
      path: external_components/buglloc/components
    components: [axs15231]

spi:
  - id: display_qspi
    type: quad
    clk_pin: GPIO17
    data_pins:
      - GPIO13
      - GPIO18
      - GPIO21
      - GPIO14

i2c:
  - id: touchscreen_bus
    sda: GPIO15
    scl: GPIO10
    scan: true
  - id: bme688_bus
    sda: GPIO45
    scl: GPIO46
    scan: true
    frequency: 100kHz

font:
  - file:
      type: gfonts
      family: Inter
      weight: 600
    id: inter_15_semibold
    size: 15
    glyphs: "AIQ"
    bpp: 8
  - file:
      type: gfonts
      family: Inter
      weight: 700
    id: inter_15_bold
    size: 15
    glyphs: "/ACDEGHILMNORSTVXY"
    bpp: 8
  - file:
      type: gfonts
      family: Inter
      weight: 600
    id: inter_14_semibold
    size: 14
    glyphs: "%CEHMOPRTV°₂e"
    bpp: 8
  - file:
      type: gfonts
      family: Space Mono
      weight: 700
    id: space_mono_62_bold
    size: 62
    glyphs: "0123456789-"
    bpp: 8
  - file:
      type: gfonts
      family: Space Grotesk
      weight: 400
    id: space_grotesk_56_regular
    size: 56
    glyphs: ":"
    bpp: 8
  - file:
      type: gfonts
      family: Space Mono
      weight: 700
    id: space_mono_48_bold
    size: 48
    glyphs: "0123456789-"
    bpp: 8
  - file:
      type: gfonts
      family: Space Mono
      weight: 700
    id: space_mono_28_bold
    size: 28
    glyphs: "0123456789-"
    bpp: 8
  - file:
      type: gfonts
      family: Space Mono
      weight: 700
    id: space_mono_18_bold
    size: 18
    glyphs: "."
    bpp: 8

display:
  - platform: axs15231
    id: main_display
    spi_id: display_qspi
    backlight_pin: GPIO1
    update_interval: never
    dimensions:
      width: 180
      height: 640
    cs_pin: GPIO12
    reset_pin: GPIO16
    rotation: 90
    auto_clear_enabled: true
    lambda: |-
      it.fill(Color::BLACK);

      const Color primary_text(0xFA, 0xFA, 0xFA);
      const Color divider_color(0x27, 0x27, 0x2A);
      const Color accent_text(0x71, 0x71, 0x7A);
      const Color label_color(0xA6, 0xA6, 0xAC);
      const Color unit_color(0x5C, 0x5C, 0x63);
      const Color muted_text(0x3F, 0x3F, 0x46);
      const Color fan_color(0xEF, 0x44, 0x44);
      const Color orbit_color(0x55, 0x55, 0x59);
      const Color sun_color(0xFA, 0xCC, 0x15);

      auto format_tenths = [](float value, char *whole_text, size_t whole_size, char decimal_text[2]) {
        const int scaled = static_cast<int>(roundf(value * 10.0f));
        snprintf(whole_text, whole_size, "%d", scaled / 10);
        decimal_text[0] = static_cast<char>('0' + std::abs(scaled % 10));
        decimal_text[1] = '\0';
      };

      const auto now = id(esptime).now();
      char clock_text[6] = "--:--";
      if (now.is_valid()) {
        int display_hour = now.hour % 12;
        if (display_hour == 0) {
          display_hour = 12;
        }
        snprintf(clock_text, sizeof(clock_text), "%02d:%02d", display_hour, now.minute);
      }

      it.circle(113, 91, 76, orbit_color);
      if (now.is_valid()) {
        static const float kPi = 3.14159265358979323846f;
        const float day_progress =
          static_cast<float>(now.hour * 3600 + now.minute * 60 + now.second) / 86400.0f;
        const float sun_angle = (90.0f + day_progress * 360.0f) * (kPi / 180.0f);
        const int sun_x = static_cast<int>(roundf(113.0f + cosf(sun_angle) * 76.0f));
        const int sun_y = static_cast<int>(roundf(91.0f + sinf(sun_angle) * 76.0f));
        it.filled_circle(sun_x, sun_y, 5, sun_color);
      }

      const int time_xs[] = {24, 65, 106, 124, 165};
      char clock_char[2] = {'\0', '\0'};
      for (size_t i = 0; i < 5; i++) {
        clock_char[0] = clock_text[i];
        if (clock_char[0] == ':') {
          it.print(time_xs[i], 47, id(space_grotesk_56_regular), accent_text, TextAlign::TOP_LEFT, clock_char);
        } else {
          it.print(time_xs[i], 36, id(space_mono_62_bold), primary_text, TextAlign::TOP_LEFT, clock_char);
        }
      }

      if (id(fume_extractor_relay).state) {
        it.filled_rectangle(99, 122, 19, 10, fan_color);
        it.filled_circle(99, 127, 5, fan_color);
        it.filled_circle(118, 127, 5, fan_color);
      }

      const bool has_iaq = id(iaq).has_state() && !std::isnan(id(iaq).state);
      const bool has_voc = id(bme68x_breath_voc_equivalent).has_state() && !std::isnan(id(bme68x_breath_voc_equivalent).state);
      const bool has_co2 = id(bme68x_co2_equivalent).has_state() && !std::isnan(id(bme68x_co2_equivalent).state);
      const bool has_temp = id(bme68x_temperature).has_state() && !std::isnan(id(bme68x_temperature).state);
      const bool has_humidity = id(bme68x_humidity).has_state() && !std::isnan(id(bme68x_humidity).state);

      // Product-specific IAQ severity mapping; V3 changes placement/typography,
      // not the classification semantics.
      const char *iaq_status_label = "N/A";
      Color iaq_status_color = muted_text;
      if (id(iaq_classification).has_state()) {
        const auto &classification = id(iaq_classification).state;
        if (classification == "Excellent") {
          iaq_status_label = "EXCELLENT";
          iaq_status_color = Color(0x2E, 0x96, 0xE5);
        } else if (classification == "Good") {
          iaq_status_label = "GOOD";
          iaq_status_color = Color(0x00, 0xCC, 0x66);
        } else if (classification == "Lightly polluted") {
          iaq_status_label = "LIGHT";
          iaq_status_color = Color(0xFF, 0xCC, 0x00);
        } else if (classification == "Moderately polluted") {
          iaq_status_label = "MODERATE";
          iaq_status_color = Color(0xFF, 0x88, 0x00);
        } else if (classification == "Heavily polluted") {
          iaq_status_label = "HEAVY";
          iaq_status_color = Color(0xFF, 0x44, 0x00);
        } else if (classification == "Severely polluted") {
          iaq_status_label = "SEVERE";
          iaq_status_color = Color(0xFF, 0x00, 0x00);
        } else if (classification == "Extremely polluted") {
          iaq_status_label = "EXTREME";
          iaq_status_color = Color(0xCC, 0x00, 0xFF);
        }
      }

      char iaq_value_text[5] = "--";
      if (has_iaq) {
        snprintf(iaq_value_text, sizeof(iaq_value_text), "%d", static_cast<int>(id(iaq).state));
      }

      char voc_int_text[4] = "-";
      char voc_dec_text[2] = "-";
      if (has_voc) {
        format_tenths(id(bme68x_breath_voc_equivalent).state, voc_int_text, sizeof(voc_int_text), voc_dec_text);
      }

      char co2_int_text[6] = "-";
      char co2_dec_text[2] = "-";
      if (has_co2) {
        format_tenths(id(bme68x_co2_equivalent).state, co2_int_text, sizeof(co2_int_text), co2_dec_text);
      }

      char temperature_int_text[4] = "-";
      char temperature_dec_text[2] = "-";
      if (has_temp) {
        format_tenths(id(bme68x_temperature).state, temperature_int_text, sizeof(temperature_int_text), temperature_dec_text);
      }

      char humidity_int_text[4] = "-";
      char humidity_dec_text[2] = "-";
      if (has_humidity) {
        format_tenths(id(bme68x_humidity).state, humidity_int_text, sizeof(humidity_int_text), humidity_dec_text);
      }

      const int divider_y = 18;
      const int divider_height = 142;
      it.filled_rectangle(227, divider_y, 1, divider_height, divider_color);
      it.filled_rectangle(370, divider_y, 1, divider_height, divider_color);
      it.filled_rectangle(517, divider_y, 1, divider_height, divider_color);

      it.print(238, 31, id(inter_15_semibold), label_color, TextAlign::TOP_LEFT, "IAQ");
      it.print(238, 53, id(space_mono_48_bold), has_iaq ? iaq_status_color : muted_text, TextAlign::TOP_LEFT, iaq_value_text);
      it.print(238, 128, id(inter_15_bold), primary_text, TextAlign::TOP_LEFT, iaq_status_label);

      it.print(381, 22, id(space_mono_28_bold), has_voc ? primary_text : muted_text, TextAlign::TOP_LEFT, voc_int_text);
      it.print(399, 36, id(space_mono_18_bold), has_voc ? accent_text : muted_text, TextAlign::TOP_LEFT, ".");
      it.print(411, 22, id(space_mono_28_bold), has_voc ? primary_text : muted_text, TextAlign::TOP_LEFT, voc_dec_text);
      it.print(381, 65, id(inter_14_semibold), label_color, TextAlign::TOP_LEFT, "VOC");
      it.print(423, 65, id(inter_14_semibold), unit_color, TextAlign::TOP_LEFT, "PPM");

      it.print(381, 96, id(space_mono_28_bold), has_co2 ? primary_text : muted_text, TextAlign::TOP_LEFT, co2_int_text);
      it.print(433, 110, id(space_mono_18_bold), has_co2 ? accent_text : muted_text, TextAlign::TOP_LEFT, ".");
      it.print(445, 96, id(space_mono_28_bold), has_co2 ? primary_text : muted_text, TextAlign::TOP_LEFT, co2_dec_text);
      it.print(381, 139, id(inter_14_semibold), label_color, TextAlign::TOP_LEFT, "CO₂e");
      it.print(429, 139, id(inter_14_semibold), unit_color, TextAlign::TOP_LEFT, "PPM");

      it.print(528, 22, id(space_mono_28_bold), has_temp ? primary_text : muted_text, TextAlign::TOP_LEFT, temperature_int_text);
      it.print(563, 36, id(space_mono_18_bold), has_temp ? accent_text : muted_text, TextAlign::TOP_LEFT, ".");
      it.print(575, 22, id(space_mono_28_bold), has_temp ? primary_text : muted_text, TextAlign::TOP_LEFT, temperature_dec_text);
      it.print(528, 65, id(inter_14_semibold), label_color, TextAlign::TOP_LEFT, "TEMP");
      it.print(580, 65, id(inter_14_semibold), unit_color, TextAlign::TOP_LEFT, "°C");

      it.print(528, 96, id(space_mono_28_bold), has_humidity ? primary_text : muted_text, TextAlign::TOP_LEFT, humidity_int_text);
      it.print(563, 110, id(space_mono_18_bold), has_humidity ? accent_text : muted_text, TextAlign::TOP_LEFT, ".");
      it.print(575, 96, id(space_mono_28_bold), has_humidity ? primary_text : muted_text, TextAlign::TOP_LEFT, humidity_dec_text);
      it.print(528, 139, id(inter_14_semibold), label_color, TextAlign::TOP_LEFT, "RH");
      it.print(557, 139, id(inter_14_semibold), unit_color, TextAlign::TOP_LEFT, "%");

interval:
  - interval: 1min
    then:
      - component.update: main_display

sensor:
  - platform: copy
    source_id: iaq
    id: iaq_display_refresh
    internal: true
    on_value:
      then:
        - component.update: main_display
  - platform: copy
    source_id: bme68x_temperature
    id: temperature_display_refresh
    internal: true
    on_value:
      then:
        - component.update: main_display
  - platform: copy
    source_id: bme68x_humidity
    id: humidity_display_refresh
    internal: true
    on_value:
      then:
        - component.update: main_display
  - platform: copy
    source_id: bme68x_breath_voc_equivalent
    id: voc_display_refresh
    internal: true
    on_value:
      then:
        - component.update: main_display
  - platform: copy
    source_id: bme68x_co2_equivalent
    id: co2_display_refresh
    internal: true
    on_value:
      then:
        - component.update: main_display

text_sensor:
  - platform: copy
    source_id: iaq_classification
    id: iaq_classification_display_refresh
    internal: true
    on_value:
      then:
        - component.update: main_display

touchscreen:
  - platform: axs15231
    id: main_touchscreen
    display: main_display
    i2c_id: touchscreen_bus
    interrupt_pin: GPIO11
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true
    on_touch:
      - lambda: |-
          ESP_LOGI(
            "touch",
            "x=%d, y=%d, x_raw=%d, y_raw=%d",
            touch.x,
            touch.y,
            touch.x_raw,
            touch.y_raw
          );

switch:
  - platform: gpio
    id: fume_extractor_relay
    name: Fume Extractor Relay
    pin: GPIO43
    restore_mode: ALWAYS_OFF
    on_turn_on:
      then:
        - component.update: main_display
    on_turn_off:
      then:
        - component.update: main_display
