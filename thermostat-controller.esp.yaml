substitutions:
  friendly_name: Theoretical Thermostat Climate Controller
  name: theoretical_thermostat_ctrl
  mm_wave_rx_pin: "44"
  mm_wave_tx_pin: "43"

packages:
  esp32-base: !include packages/esp32-base.esp.yaml
  sense: !include packages/esp32s3-sense.esp.yaml
  thermostat-shared: !include packages/thermostat-shared.esp.yaml
  # mm-wave: !include packages/mm-wave-presence-compact.esp.yaml

bme68x_bsec2_i2c:
  i2c_id: bus_i2c
  address: 0x77
  model: bme688
  operating_age: 28d
  sample_rate: LP
  supply_voltage: 3.3V

climate:
  - platform: thermostat
    name: Climate Control
    id: climate_control
    visual:
      min_temperature: ${thermostat_min_temp}
      max_temperature: ${thermostat_max_temp}
      temperature_step:
        target_temperature: ${thermostat_temp_step}
        current_temperature: 0.1
      max_humidity: 60%
    on_boot_restore_from: DEFAULT_PRESET
    default_preset: home
    sensor: target_room_temperature
    humidity_sensor: target_room_humidity
    heat_deadband: 0.3
    heat_overrun: ${thermostat_heat_overrun}
    cool_deadband: 0.3
    cool_overrun: ${thermostat_cool_overrun}
    min_idle_time: 2min
    min_cooling_off_time: 2min
    min_heating_off_time: 2min
    min_heating_run_time: 1min
    min_cooling_run_time: 1min
    min_fanning_off_time: 3min
    min_fanning_run_time: 2min
    min_fan_mode_switching_time: 5s
    fan_only_action_uses_fan_mode_timer: true
    fan_with_cooling: true
    fan_with_heating: true
    idle_action:
      then:
        - lambda: |-
            id(requested_ac).turn_off();
            id(requested_heat).turn_off();
            if (id(climate_control).fan_mode != climate::CLIMATE_FAN_ON) {
              id(requested_fan).turn_off();
            }
    heat_action:
      then:
        - lambda: |-
            id(requested_heat).turn_on();
    cool_action:
      then:
        - lambda: |-
            id(requested_ac).turn_on();
    fan_only_action:
      then:
        - switch.turn_on: requested_fan
    fan_mode_auto_action:
      then:
        - lambda: |-
            if (id(requested_ac).state || id(requested_heat).state) {
              id(requested_fan).turn_on();
            } else {
              id(requested_fan).turn_off();
            }
    fan_mode_on_action:
      then:
        - switch.turn_on: requested_fan
    fan_mode_off_action:
      then:
        - switch.turn_off: requested_fan

    preset:
      - name: home
        default_target_temperature_low: 22
        default_target_temperature_high: 24.5
        mode: HEAT_COOL
        fan_mode: AUTO
      - name: eco
        default_target_temperature_low: 21
        default_target_temperature_high: 26
        mode: HEAT_COOL
        fan_mode: AUTO
      - name: sleep
        default_target_temperature_low: 21
        default_target_temperature_high: 23
        mode: HEAT_COOL
        fan_mode: AUTO
      - name: away
        default_target_temperature_low: 16
        default_target_temperature_high: 30
        mode: HEAT_COOL
        fan_mode: AUTO

sensor:

  # Room
  - platform: homeassistant
    name: Target Room Temperature
    id: target_room_temperature
    entity_id: sensor.thermostat_target_room_temperature

  - platform: homeassistant
    name: Target Room Humidity
    id: target_room_humidity
    entity_id: sensor.thermostat_target_room_humidity

  # Air quality, temperature and humidity
  - platform: bme68x_bsec2
    temperature:
      name: "BME68x Temperature"
    pressure:
      name: "BME68x Pressure"
    humidity:
      name: "BME68x Humidity"
    iaq:
      name: "BME68x IAQ"
      id: iaq
    co2_equivalent:
      name: "BME68x CO2 Equivalent"
    breath_voc_equivalent:
      name: "BME68x Breath VOC Equivalent"


text_sensor:
  - platform: template
    name: "BME68x IAQ Classification"
    # TODO: This should handle the case where the IAQ sensor is unavailable
    lambda: |-
      if ( int(id(iaq).state) <= 50) {
        return {"Excellent"};
      }
      else if (int(id(iaq).state) >= 51 && int(id(iaq).state) <= 100) {
        return {"Good"};
      }
      else if (int(id(iaq).state) >= 101 && int(id(iaq).state) <= 150) {
        return {"Lightly polluted"};
      }
      else if (int(id(iaq).state) >= 151 && int(id(iaq).state) <= 200) {
        return {"Moderately polluted"};
      }
      else if (int(id(iaq).state) >= 201 && int(id(iaq).state) <= 250) {
        return {"Heavily polluted"};
      }
      else if (int(id(iaq).state) >= 251 && int(id(iaq).state) <= 350) {
        return {"Severely polluted"};
      }
      else if (int(id(iaq).state) >= 351) {
        return {"Extremely polluted"};
      }
      else {
        return {"error"};
      }

switch:
  - platform: template
    name: Climate Override
    id: climate_override
    optimistic: true
    restore_mode: ALWAYS_OFF
  - platform: template
    name: A/C Override
    id: override_ac
    optimistic: true
    restore_mode: ALWAYS_OFF
  - platform: template
    name: Heat Override
    id: override_heat
    optimistic: true
    restore_mode: ALWAYS_OFF
  - platform: template
    name: Fan Override
    id: override_fan
    optimistic: true
    restore_mode: ALWAYS_OFF

  - platform: template
    name: A/C Requested
    id: requested_ac
    internal: true
    optimistic: true
    restore_mode: ALWAYS_OFF
  - platform: template
    name: Heat Requested
    id: requested_heat
    internal: true
    optimistic: true
    restore_mode: ALWAYS_OFF
  - platform: template
    name: Fan Requested
    id: requested_fan
    internal: true
    optimistic: true
    restore_mode: ALWAYS_OFF


binary_sensor:
  - platform: template
    name: Computed A/C
    id: computed_ac
    lambda: |-
      return id(climate_override).state ? id(override_ac).state : id(requested_ac).state;
    on_state:
      then:
        - logger.log:
            format: "Setting AC Pin to %d"
            args: ['id(computed_ac).state']
        - lambda: |-
            if (id(computed_ac).state) id(pin_ac).turn_on();
            else id(pin_ac).turn_off();
  - platform: template
    name: Computed Heat
    id: computed_heat
    lambda: |-
      return id(climate_override).state ? id(override_heat).state : id(requested_heat).state;
    on_state:
      then:
        - logger.log:
            format: "Setting Heat Pin to %d"
            args: ['id(computed_heat).state']
        - lambda: |-
            if (id(computed_heat).state) id(pin_heat).turn_on();
            else id(pin_heat).turn_off();
  - platform: template
    name: Computed Fan
    id: computed_fan
    lambda: |-
      return id(climate_override).state ? id(override_fan).state : id(requested_fan).state;
    on_state:
      then:
        - logger.log:
            format: "Setting Fan Pin to %d"
            args: ['id(computed_fan).state']
        - lambda: |-
            if (id(computed_fan).state) id(pin_fan).turn_on();
            else id(pin_fan).turn_off();

light:
  - platform: status_led
    id: status_light
    name: "Status LED"
    pin:
      number: 21
      inverted: true

output:
  - platform: gpio
    id: pin_ac
    pin: 1
  - platform: gpio
    id: pin_heat
    pin: 2
  - platform: gpio
    pin: 3
    id: pin_fan
