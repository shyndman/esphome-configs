substitutions:
  friendly_name: Theoretical Thermostat Display
  name: thermostat_display

packages:
  device-base: !include packages/device-base.esp.yaml
  ble-beacon-tracker: !include packages/ble-beacon-tracker.esp.yaml

esphome:
  platformio_options:
    build_flags: -DBOARD_HAS_PSRAM
    board_build.f_flash: 80000000L
    board_build.flash_mode: dio
    build_unflags: -Werror=all

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  # partitions: /config/include/partitions_16MB.csv
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y

psram:
  mode: quad
  speed: 80MHz

