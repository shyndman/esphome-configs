substitutions:
  friendly_name: Theoretical Thermostat Display
  name: thermostat_display

packages:
  esp32-base: !include packages/esp32-base.esp.yaml
  t-panel-s3: !include packages/t-panel-s3.esp.yaml

logger:
  level: INFO

esphome:
  on_boot:
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 90%

image:
  - file: mdi:power
    id: power
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:snowflake
    id: snowflake
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:fire
    id: fire
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:fan
    id: fan
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:weather-night
    id: clear_night
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-cloudy
    id: cloudy
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-fog
    id: fog
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-hail
    id: hail
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-lightning
    id: lightning
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-lightning-rainy
    id: lightning_rainy
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-partly-cloudy
    id: partlycloudy
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-pouring
    id: pouring
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-rainy
    id: rainy
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-snowy
    id: snowy
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-snowy-rainy
    id: snowy_rainy
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-sunny
    id: sunny
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-windy
    id: windy
    type: grayscale
    transparency: alpha_channel
    resize: 28x28
  - file: mdi:weather-windy-variant
    id: windy_variant
    type: grayscale
    transparency: alpha_channel
    resize: 28x28

font:
  - file: gfonts://Figtree@600
    id: cur_temp_font
    size: 72
    bpp: 4
    glyphs: [
      0123456789,°
    ]
  - file: gfonts://Figtree@500
    id: top_bar_weather
    size: 25
    bpp: 4
  - file: gfonts://Figtree@300
    id: top_bar_lighter
    size: 22
    bpp: 8
  - file: gfonts://Figtree@500
    id: top_bar_emph
    size: 22
    bpp: 4


lvgl:
  displays:
    - rgb_display
  buffer_size: 100%

  style_definitions:
    - id: warming_color
      bg_color: 0xe1752e
    - id: cooling_color
      bg_color: 0x2776cc
    - id: top_bar_color
      text_color: 0xc0c0c0
    - id: icon_bar_color
      text_color: 0xdadada
    - id: blurred_temp_color
      text_color: 0x303030

  pages:
    - id: main_page
      bg_color: 0x000000
      widgets:
        # TOP BAR - Flexbox container
        - obj:
            id: top_bar
            x: 8
            y: 4
            width: 464
            height: 40
            bg_opa: 0
            border_width: 0
            # pad_left: 8
            # pad_right: 8
            pad_top: 0
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_between
              flex_align_cross: center
            widgets:
              # Weather group (left side)
              - obj:
                  id: weather_group
                  bg_opa: 0
                  border_width: 0
                  flex_grow: 1
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: center
                    # pad_column: 4
                  widgets:
                    - image:
                        id: weather_icon
                        src: sunny
                        image_recolor: 0xc0c0c0
                        image_recolor_opa: 100%
                    - label:
                        id: weather_temp
                        text: "16°"
                        text_font: top_bar_weather
                        text_color: 0xc0c0c0

              # Room group (right side)
              - obj:
                  id: room_group
                  bg_opa: 0
                  border_width: 0
                  flex_grow: 1
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: end
                    flex_align_cross: center
                  widgets:
                    - label:
                        id: room_name
                        text: "Living Room"
                        text_font: top_bar_lighter
                        text_color: 0xc0c0c0
                    - label:
                        id: room_temp
                        text: "19°"
                        text_font: top_bar_emph
                        text_color: 0xc0c0c0

        # CENTER - Current temperature (large, left) - align baseline with stripe
        - label:
            id: current_temp
            text: "23°"
            x: 50
            y: 170  # Original 176 - 6 pixel adjustment for baseline alignment
            text_font: cur_temp_font
            text_color: 0x2776cc

        # CENTER - Target temperature (large, right, dimmed)
        - label:
            id: target_temp
            text: "19°"
            x: 430
            y: 170  # Same baseline alignment
            text_font: cur_temp_font
            text_color: 0x303030
            text_align: right

        # ACTION ACCENT STRIPE (colored rectangle)
        - obj:
            id: action_stripe
            x: 0
            y: 238
            width: 480
            height: 242
            bg_color: 0x2776cc
            border_width: 0

        # ACTION BAR - Flexbox container on the stripe (move up to avoid clipping)
        - obj:
            id: action_bar
            x: 0
            y: 390  # Move up from 418 to avoid clipping (480 - 36 - 54 margin)
            width: 480
            height: 36
            bg_opa: 0
            border_width: 0
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_evenly
              flex_align_cross: center
            widgets:
              - image:
                  id: mode_icon
                  src: snowflake
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
              - image:
                  id: power_icon
                  src: power
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
              - image:
                  id: fan_icon
                  src: fan
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
