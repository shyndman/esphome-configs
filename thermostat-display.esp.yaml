substitutions:
  friendly_name: Theoretical Thermostat Display
  name: theoretical_thermostat_display

  thermostat_display_id: rgb_display
  thermostat_touchscreen_id: rgb_display_touchscreen

packages:
  esp32-base: !include packages/esp32-base.esp.yaml
  t-panel-s3: !include packages/t-panel-s3.esp.yaml
  thermostat-display-ui: !include packages/thermostat/display-ui.esp.yaml

logger:
  level: DEBUG

esphome:
  on_boot:
    then:
      - light.turn_on:
          id: display_backlight
          brightness: 90%
