# Office Ring Light - ESP32 Control System
#
# This configuration controls a modified Ali Express ring light/magnifying glass.
# The original device was USB-powered with physical buttons for control. We've added
# an ESP32C3 to intercept and control the button signals, giving us smart home integration.
#
# Hardware Control:
# - GPIO 4: Power toggle (relay signal)
# - GPIO 7: Cycle color temperature mode (inverted signal)
# - GPIO 10: Increase brightness (inverted signal)
# - GPIO 21: Decrease brightness (inverted signal)
#
# Device Capabilities:
# - 10 brightness levels (0-9, where 0 is dimmest, not off)
# - 3 color temperature modes that cycle: Yellow -> White+Yellow -> White -> Yellow...
# - Physical power on/off via relay signal
#
# Home Assistant Integration:
# - Unified light entity with brightness slider (0-100% -> 0-9 levels)
# - Color temperature control (2000-6500K mapped to the 3 modes)
# - Smart state management handles HA's off/on expectations vs hardware reality
# - When HA sends brightness=0 (off), we trigger the power relay
# - When HA sends brightness>0 while off, we power on then set brightness
# - Individual GPIO switches available for manual state synchronization
# - SSD1306 display shows current brightness level, mode, and connection status

substitutions:
  friendly_name: Office Ring Light
  name: office_ring_light

packages:
  device-base: !include packages/device-base.esp.yaml
  supermini: !include packages/esp32c3-supermini.esp.yaml

logger:
  level: DEBUG

preferences:
  flash_write_interval: never

web_server:
  version: 3

esphome:

api:
  on_client_connected:
    - logger.log:
        level: INFO
        format: "CLIENT CONNECTED TEST - Client %s connected from %s"
        args: ["client_info.c_str()", "client_address.c_str()"]
    - logger.log:
        level: INFO
        format: "=== RING LIGHT STATE DUMP ==="
    - logger.log:
        level: INFO
        format: "Power State: %s"
        args: ["id(power_state) ? \"ON\" : \"OFF\""]
    - logger.log:
        level: INFO
        format: "Current Brightness: %d (0-9)"
        args: ["id(current_brightness)"]
    - logger.log:
        level: INFO
        format: "Current Mode: %d (0=White, 1=W+Y, 2=Yellow)"
        args: ["id(current_mode)"]
    - logger.log:
        level: INFO
        format: "=== END STATE DUMP ==="

i2c:
  - id: i2c_display
    scl: 6
    sda: 5
    frequency: 400kHz
    scan: false

globals:
  - id: current_brightness
    type: 'int'
    restore_value: yes
    initial_value: '0'  # Start at lowest brightness
  - id: current_mode
    type: 'int'
    restore_value: yes
    initial_value: '1'  # Start at W+Y mode (0=White, 1=W+Y, 2=Yellow)
  - id: power_state
    type: bool
    restore_value: yes
    initial_value: 'false'  # Start with light off
  # Display management globals
  - id: display_active
    type: bool
    restore_value: no
    initial_value: 'false'  # Display is blank by default
  - id: display_message
    type: std::string
    restore_value: no
    initial_value: '""'  # Message to show on display
  - id: display_timer
    type: 'int'
    restore_value: no
    initial_value: '0'  # Countdown timer in milliseconds
  - id: pending_color_temp
    type: 'int'
    restore_value: no
    initial_value: '-1'  # Queued color temp mode when light is off (-1 = no pending change)

script:
  - id: show_display_message
    parameters:
      message: string
      duration_ms: int
    then:
      - lambda: |-
          ESP_LOGD("display", "Showing message: %s for %dms", message.c_str(), duration_ms);
          id(display_message) = message;
          id(display_timer) = duration_ms;
          id(display_active) = true;
  - id: show_power_message
    parameters:
      power_on: bool
    then:
      - script.execute:
          id: show_display_message
          message: !lambda "return power_on ? \"ON\" : \"OFF\";"
          duration_ms: 2000  # 2 seconds
  - id: show_brightness_message
    parameters:
      brightness_level: int
    then:
      - script.execute:
          id: show_display_message
          message: !lambda "return std::to_string(brightness_level + 1);"  # Convert 0-9 to 1-10
          duration_ms: 2000  # 2 seconds
  - id: show_color_message
    parameters:
      mode: int
    then:
      - script.execute:
          id: show_display_message
          message: !lambda |-
            switch(mode) {
              case 0: return std::string("W");    // White
              case 1: return std::string("A");    // All (W+Y)
              case 2: return std::string("Y");    // Yellow
              default: return std::string("?");
            }
          duration_ms: 2000  # 2 seconds
  - id: apply_color_mode
    parameters:
      target_mode: int
    then:
      - lambda: |-
          int current_mode_val = id(current_mode);
          int target = target_mode;
          
          ESP_LOGD("apply_color_mode", "Applying color mode %d (current: %d)", target, current_mode_val);
          
          if (target == current_mode_val) {
            ESP_LOGD("apply_color_mode", "Target matches current - no change needed");
            return; // No change needed
          }
          
          // Calculate how many mode cycle presses needed
          // Mode cycling: 0(W) -> 1(W+Y) -> 2(Y) -> 0(W) -> ...
          int steps = 0;
          int temp_mode = current_mode_val;
          
          while (temp_mode != target) {
            temp_mode = (temp_mode + 1) % 3; // Cycle through 0,1,2
            steps++;
          }
          
          // Send the mode cycle presses
          for (int i = 0; i < steps; i++) {
            id(cycle_light_temperature_signal_switch).turn_on();
            delay(100); // Small delay between presses
          }
          
          // Update stored state
          id(current_mode) = target;

light:
  - platform: color_temperature
    name: "Ring Light"
    default_transition_length: 0s
    gamma_correct: 1.0
    brightness: brightness_output
    color_temperature: color_temp_output
    cold_white_color_temperature: 6500K
    warm_white_color_temperature: 2000K

switch:
  - platform: gpio
    id: relay_signal_switch
    name: "GPIO: Power Toggle"
    entity_category: diagnostic
    pin: 4
    on_turn_on:
    - delay: 100ms
    - switch.turn_off: relay_signal_switch
  - platform: gpio
    id: cycle_light_temperature_signal_switch
    name: "GPIO: Cycle Temperature"
    entity_category: diagnostic
    pin:
      number: 7
      inverted: true
      mode:
        output: true
    on_turn_on:
    - delay: 100ms
    - switch.turn_off: cycle_light_temperature_signal_switch
  - platform: gpio
    id: brightness_up_signal_switch
    name: "GPIO: Brightness Up"
    entity_category: diagnostic
    pin:
      number: 10
      inverted: true
      mode:
        output: true
    on_turn_on:
    - delay: 100ms
    - switch.turn_off: brightness_up_signal_switch
  - platform: gpio
    id: brightness_down_signal_switch
    name: "GPIO: Brightness Down"
    entity_category: diagnostic
    pin:
      number: 21
      inverted: true
      mode:
        output: true
    on_turn_on:
    - delay: 100ms
    - switch.turn_off: brightness_down_signal_switch

button:
  - platform: template
    name: "Recalibrate"
    entity_category: config
    on_press:
      - logger.log: "Starting ring light recalibration"
      # Reset device to known state (brightness 0)
      - repeat:
          count: 9  # Max brightness levels, ensure we're at 0
          then:
            - switch.turn_on: brightness_down_signal_switch
            - delay: 100ms
      # Set to stored brightness
      - repeat:
          count: !lambda "return id(current_brightness);"
          then:
            - switch.turn_on: brightness_up_signal_switch
            - delay: 100ms
      # Cycle to stored mode (always start from Yellow=0 and cycle to target)
      - repeat:
          count: !lambda "return id(current_mode);"
          then:
            - switch.turn_on: cycle_light_temperature_signal_switch
            - delay: 100ms
      - logger.log: "Ring light recalibration complete"

output:
  - platform: template
    id: brightness_output
    type: float
    write_action:
      - lambda: |-
          ESP_LOGD("brightness_output", "Received brightness change: %.3f (power: %s)", state, id(power_state) ? "ON" : "OFF");

          // Handle HA "off" command (brightness = 0)
          if (state == 0.0) {
            if (id(power_state)) {
              ESP_LOGD("brightness_output", "Turning light OFF");
              id(relay_signal_switch).turn_on();  // Toggle power off
              id(power_state) = false;
              // Show power off message (highest priority)
              id(show_power_message).execute(false);
            } else {
              ESP_LOGD("brightness_output", "Light already OFF - ignoring");
            }
            return;
          }

          // Handle HA "on" command (brightness > 0)
          bool was_off = !id(power_state);
          if (was_off) {
            ESP_LOGD("brightness_output", "Light is OFF - turning ON first");
            id(relay_signal_switch).turn_on();  // Toggle power on
            id(power_state) = true;
            delay(500);  // Give light time to boot up
            
            // Apply any pending color temperature change
            if (id(pending_color_temp) >= 0) {
              ESP_LOGD("brightness_output", "Applying pending color temp mode %d", id(pending_color_temp));
              id(apply_color_mode).execute(id(pending_color_temp));
              id(pending_color_temp) = -1; // Clear pending change
            }
            
            // Show power on message (highest priority)
            id(show_power_message).execute(true);
            return; // Don't show brightness when powering on
          }

          // Convert 0.0-1.0 to 0-9 brightness level
          int target_brightness = (int)(state * 9);
          int current_brightness_val = id(current_brightness);

          ESP_LOGD("brightness_output", "Converted to target level %d (current: %d)", target_brightness, current_brightness_val);

          if (target_brightness == current_brightness_val) {
            ESP_LOGD("brightness_output", "Target matches current - no change needed");
            return; // No change needed
          }

          // Calculate steps needed
          int steps = target_brightness - current_brightness_val;

          if (steps > 0) {
            // Need to increase brightness
            for (int i = 0; i < steps; i++) {
              id(brightness_up_signal_switch).turn_on();
              delay(200); // Small delay between presses
            }
          } else {
            // Need to decrease brightness
            for (int i = 0; i < -steps; i++) {
              id(brightness_down_signal_switch).turn_on();
              delay(200); // Small delay between presses
            }
          }

          // Update stored state
          id(current_brightness) = target_brightness;

          // Show brightness change on display
          id(show_brightness_message).execute(target_brightness);

  - platform: template
    id: color_temp_output
    type: float
    write_action:
      - lambda: |-
          ESP_LOGD("color_temp_output", "Received color temp change: %.3f (power: %s)", state, id(power_state) ? "ON" : "OFF");


          // Map 0.0-1.0 to modes: 0.0-0.1=White, 0.1-0.5=W+Y, 0.5-1.0=Yellow
          int target_mode;
          if (state < 0.1) {
            target_mode = 0; // White only
          } else if (state < 0.5) {
            target_mode = 1; // White + Yellow
          } else {
            target_mode = 2; // Yellow only
          }

          // If light is off, queue the color temp change for when it turns on
          if (!id(power_state)) {
            ESP_LOGD("color_temp_output", "Light is OFF - queueing color temp change to mode %d", target_mode);
            id(pending_color_temp) = target_mode;
            return;
          }

          // Apply the color mode change
          id(apply_color_mode).execute(target_mode);

          // Show color change on display (light is already on)
          id(show_color_message).execute(target_mode);

font:
  # Lexend Zetta fonts for command display - sizes measured with esphome-measure-string
  - file: "gfonts://Lexend Zetta@400"
    id: bruno_ace_large
    size: 32  # For single chars/numbers: Y(29x40), W(39x40), A(30x40), 10(43x40)
  - file: "gfonts://Lexend Zetta@400"
    id: bruno_ace_medium
    size: 26  # For power words: ON(55x33), OFF(72x33) - perfect fit for 72px width

display:
  - platform: ssd1306_i2c
    model: "SSD1306 72x40"
    i2c_id: i2c_display
    address: 0x3C
    lambda: |-
      // Display is mostly blank, only shows messages when active
      if (!id(display_active) || id(display_message).empty()) {
        // Display is off/blank
        return;
      }

      // Get the message to display
      std::string message = id(display_message);

      // Select appropriate font based on message content
      auto font = id(bruno_ace_large);  // Default to large font
      if (message == "ON" || message == "OFF") {
        font = id(bruno_ace_medium);  // Use medium font for power words
      }
      // Single characters and numbers use large font (default)

      // Center the text on the 72x40 display
      // Display dimensions: 72 wide x 40 tall
      int x_center = 36;  // 72 / 2
      int y_center = 20;  // 40 / 2

      // Print centered text
      it.printf(x_center, y_center, font, TextAlign::CENTER, "%s", message.c_str());

interval:
  - interval: 50ms  # Check timer every 50ms for smooth countdown
    then:
      - lambda: |-
          if (id(display_active) && id(display_timer) > 0) {
            id(display_timer) = id(display_timer) - 50;  // Subtract 50ms
            if (id(display_timer) <= 0) {
              // Timer expired, clear display
              ESP_LOGD("display", "Display timer expired, clearing display");
              id(display_active) = false;
              id(display_message) = "";
              id(display_timer) = 0;
            }
          }
