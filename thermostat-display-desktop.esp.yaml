substitutions:
  friendly_name: Thermostat Display Desktop
  name: thermostat_display_desktop

esphome:
  name: ${name}

host:

# WiFi not needed for host platform - uses computer's network automatically
# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password

api:
  # Required for Home Assistant integration
  # For host platform, manually add device in HA using your computer's IP:6053
  # Ensure firewall allows port 6053
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    then:
      - logger.log: "Home Assistant client connected!"
  on_client_disconnected:
    then:
      - logger.log: "Home Assistant client disconnected!"

logger:
  level: INFO

time:
  - platform: host
    id: sntp_time
    timezone: America/Toronto

globals:
  - id: current_temperature
    type: float
    initial_value: '23.0'
  - id: is_dragging
    type: bool
    initial_value: 'false'
  - id: cooling_setpoint_temp
    type: float
    initial_value: '23.0'
  - id: heating_setpoint_temp
    type: float
    initial_value: '19.0'
  - id: track_y_position
    type: int
    initial_value: '238'  # Initial y position of temperature track
  - id: active_slider
    type: int
    initial_value: '0'    # 0=none, 1=cooling(left), 2=heating(right)
  - id: last_touch_y
    type: int
    initial_value: '0'

# Home Assistant sensors for weather data
sensor:
  - platform: homeassistant
    id: outside_temperature
    entity_id: weather.pirate_toronto
    attribute: temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    on_value:
      then:
        - lvgl.label.update:
            id: weather_temp
            text: !lambda |-
              return std::string(std::to_string((int)x) + "°");
        - lvgl.widget.update:
            id: weather_temp
            opa: 100%
  - platform: homeassistant
    id: room_temperature
    entity_id: sensor.thermostat_target_room_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    on_value:
      then:
        - lvgl.label.update:
            id: room_temp
            text: !lambda |-
              return std::string(std::to_string((int)x) + "°");
        - lvgl.widget.update:
            id: room_temp
            opa: 100%

text_sensor:
  - platform: homeassistant
    id: weather_condition
    entity_id: weather.pirate_toronto
    on_value:
      then:
        - lvgl.image.update:
            id: weather_icon
            src: !lambda |-
              std::string condition = x;
              if (condition == "sunny" || condition == "clear") return id(sunny);
              if (condition == "clear-night") return id(clear_night);
              if (condition == "partlycloudy") return id(partlycloudy);
              if (condition == "cloudy" || condition == "overcast") return id(cloudy);
              if (condition == "fog" || condition == "hazy") return id(fog);
              if (condition == "rainy") return id(rainy);
              if (condition == "pouring") return id(pouring);
              if (condition == "snowy") return id(snowy);
              if (condition == "snowy-rainy") return id(snowy_rainy);
              if (condition == "lightning" || condition == "thunderstorm") return id(lightning);
              if (condition == "lightning-rainy") return id(lightning_rainy);
              if (condition == "windy") return id(windy);
              if (condition == "windy-variant") return id(windy_variant);
              if (condition == "hail") return id(hail);
              return id(sunny);
        - lvgl.widget.update:
            id: weather_icon
            opa: 100%
  - platform: homeassistant
    id: room_name_sensor
    entity_id: sensor.thermostat_target_room_name
    on_value:
      then:
        - lvgl.label.update:
            id: room_name
            text: !lambda return x;
        - lvgl.widget.update:
            id: room_name
            opa: 100%

display:
  - platform: sdl
    id: desktop_display
    dimensions:
      width: 480
      height: 480

touchscreen:
  - platform: sdl
    id: desktop_touchscreen
    update_interval: 32ms  # Match the interval rate for smoother tracking

interval:
  - interval: 32ms  # ~30fps for smooth enough dragging on limited hardware
    then:
      - if:
          condition:
            lambda: |-
              static bool last_dragging = false;
              bool current_dragging = id(is_dragging);
              if (current_dragging != last_dragging) {
                ESP_LOGI("drag", "Dragging state changed: %s", current_dragging ? "STARTED" : "STOPPED");
                last_dragging = current_dragging;
              }
              return current_dragging;
          then:
            - lambda: |-
                // Get current touch position if available
                auto touch = id(desktop_touchscreen);
                auto touch_point = touch->get_touch();
                if (touch_point.has_value()) {
                  int current_y = touch_point.value().y;
                  int delta_y = current_y - id(last_touch_y);

                  // Update track position with constraints
                  int new_track_y = id(track_y_position) + delta_y;

                  // Constrain track between y=130 (top) and y=380 (bottom)
                  if (new_track_y < 130) new_track_y = 130;
                  if (new_track_y > 380) new_track_y = 380;

                  if (abs(delta_y) > 2) {  // Only log significant movements
                    ESP_LOGI("drag", "Dragging: current_y=%d, delta=%d, new_track_y=%d", current_y, delta_y, new_track_y);
                  }

                  id(track_y_position) = new_track_y;
                  id(last_touch_y) = current_y;

                  // Map track position (130-380) to temperature (26-16)
                  // Formula: temp = 26 - ((track_y - 130) / 250) * 10
                  float temp_range = 10.0; // 26 - 16 = 10 degrees
                  float y_range = 250.0;   // 380 - 130 = 250 pixels
                  float normalized_y = (new_track_y - 130.0) / y_range; // 0.0 to 1.0
                  id(cooling_setpoint_temp) = 26.0 - (normalized_y * temp_range);

                  ESP_LOGI("temp", "Track y=%d, Temperature=%.1f", new_track_y, id(cooling_setpoint_temp));
                }
            - lvgl.widget.update:
                id: temperature_track
                y: !lambda return id(track_y_position);
                height: !lambda return 480 - id(track_y_position);
            - lvgl.widget.update:
                id: setpoint_group
                y: !lambda |-
                  int label_y = id(track_y_position) - 69;
                  return label_y < 50 ? 50 : label_y;
            - lvgl.label.update:
                id: cooling_setpoint
                text: !lambda |-
                  char buffer[10];
                  snprintf(buffer, sizeof(buffer), "%.0f°", id(cooling_setpoint_temp));
                  return std::string(buffer);
            - lvgl.widget.update:
                id: track_touch_zone
                y: !lambda |-
                  int zone_y = id(track_y_position) - 100;
                  return zone_y < 0 ? 0 : zone_y;
                height: !lambda |-
                  int zone_y = id(track_y_position) - 100;
                  int zone_height = 200;
                  if (zone_y < 0) {
                    zone_height += zone_y;
                  }
                  return zone_height > 0 ? zone_height : 100;

image:
  - file: mdi:power
    id: power
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:snowflake
    id: snowflake
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:fire
    id: fire
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:fan
    id: fan
    type: grayscale
    transparency: alpha_channel
    resize: 36x36
  - file: mdi:weather-night
    id: clear_night
    type: grayscale
    transparency: alpha_channel
