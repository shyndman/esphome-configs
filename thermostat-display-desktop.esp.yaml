font:
  - file: gfonts://Figtree@600
    id: setpoint_font
    size: 72
    bpp: 4
    glyphs: [
      0123456789,°
    ]
  - file: gfonts://Figtree@500
    id: top_bar_weather
    size: 25
    bpp: 4
  - file: gfonts://Figtree@300
    id: top_bar_room
    size: 23
    bpp: 8
  - file: gfonts://Figtree@500
    id: top_bar_temp
    size: 23
    bpp: 4

lvgl:
  displays:
    - desktop_display
  touchscreens:
    - touchscreen_id: desktop_touchscreen
  buffer_size: 100%

  style_definitions:
    - id: warming_color
      bg_color: 0xe1752e
    - id: cooling_color
      bg_color: 0x2776cc
    - id: top_bar_color
      text_color: 0xc0c0c0
    - id: icon_bar_color
      text_color: 0xdadada
    - id: blurred_temp_color
      text_color: 0x303030

  pages:
    - id: main_page
      bg_color: 0x000000
      scrollable: false
      widgets:
        # TOP BAR - Flexbox container
        - obj:
            id: top_bar
            x: 0
            y: 0
            width: 100%
            height: 40
            bg_opa: 0
            border_width: 0
            scrollable: false
            pad_all: 0
            layout:
              type: FLEX
              flex_flow: ROW
              flex_align_main: SPACE_BETWEEN
              flex_align_cross: CENTER
            widgets:
              # Weather group (left side)
              - obj:
                  id: weather_group
                  bg_opa: 0
                  border_width: 0
                  flex_grow: 1
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_cross: center
                  widgets:
                    - image:
                        id: weather_icon
                        src: sunny
                        image_recolor: 0xc0c0c0
                        image_recolor_opa: 100%
                        opa: 0  # Transparent until we get data
                    - label:
                        id: weather_temp
                        text: ""
                        text_font: top_bar_weather
                        text_color: 0xc0c0c0
                        opa: 0  # Transparent until we get data

              # Room group (right side)
              - obj:
                  id: room_group
                  bg_opa: 0
                  border_width: 0
                  flex_grow: 1
                  y: 1 # Slight nudge down to align with weather icon
                  layout:
                    type: flex
                    flex_flow: row
                    flex_align_main: end
                    flex_align_cross: center
                  widgets:
                    - label:
                        id: room_name
                        text: ""
                        text_font: top_bar_room
                        text_color: 0xc0c0c0
                        opa: 0  # Transparent until we get data
                    - label:
                        id: room_temp
                        text: ""
                        text_font: top_bar_temp
                        text_color: 0xc0c0c0
                        opa: 0  # Transparent until we get data

        - obj:
            id: setpoint_group
            bg_opa: 0
            border_width: 0
            y: !lambda |-
              int label_y = id(track_y_position) - 69;
              return label_y < 50 ? 50 : label_y;
            width: 100%
            height: 70
            pad_all: 0
            pad_left: 48
            pad_right: 48
            scrollable: false
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_between
            widgets:
              # CENTER - The temperature at which the air conditioner will engage (large, left) - align baseline with track
              - label:
                  id: cooling_setpoint
                  text: "23°"
                  text_font: setpoint_font
                  text_color: 0x2776cc

              # CENTER - The temperature at which the furnace will engage (large, right) - align baseline with track
              - label:
                  id: heating_setpoint
                  text: "19°"
                  text_font: setpoint_font
                  text_color: 0x292929
                  text_align: right

        # TEMPERATURE TRACK - Manual gesture control
        - obj:
            id: temperature_track
            x: 0
            y: !lambda return id(track_y_position);
            width: 480
            height: !lambda return 480 - id(track_y_position);
            bg_color: 0x2776cc
            border_width: 0
            radius: 0

        # TOUCH ZONE - 100px above and below track top edge for drag detection
        - obj:
            id: track_touch_zone
            x: 0
            y: !lambda |-
              int zone_y = id(track_y_position) - 100;
              return zone_y < 0 ? 0 : zone_y;
            width: 480
            height: !lambda |-
              int zone_y = id(track_y_position) - 100;
              int zone_height = 200;
              if (zone_y < 0) {
                zone_height += zone_y;
              }
              return zone_height > 0 ? zone_height : 100;
            bg_opa: 0
            border_width: 0
            clickable: true
            on_press:
              then:
                - logger.log: "Touch zone pressed!"
                - globals.set:
                    id: is_dragging
                    value: 'true'
                - lambda: |-
                    auto touch = id(desktop_touchscreen);
                    auto touch_point = touch->get_touch();
                    if (touch_point.has_value()) {
                      id(last_touch_y) = touch_point.value().y;
                      ESP_LOGI("touch", "Initial touch at y=%d", touch_point.value().y);
                    } else {
                      ESP_LOGW("touch", "No touch point available on press");
                    }
            on_release:
              then:
                - logger.log: "Touch zone released!"
                - globals.set:
                    id: is_dragging
                    value: 'false'

        # ACTION BAR - Icons on the track
        - obj:
            id: action_bar
            x: 0
            y: 400
            width: 100%
            height: 50
            bg_opa: 0
            border_width: 0
            scrollable: false
            layout:
              type: flex
              flex_flow: row
              flex_align_main: space_evenly
              flex_align_cross: center
            widgets:
              - image:
                  id: mode_icon
                  src: snowflake
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
              - image:
                  id: power_icon
                  src: power
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
              - image:
                  id: fan_icon
                  src: fan
                  image_recolor: 0xdadada
                  image_recolor_opa: 100%
