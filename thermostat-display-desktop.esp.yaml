substitutions:
  friendly_name: Thermostat Display Desktop
  name: thermostat_display_desktop

  thermostat_display_id: desktop_display
  thermostat_touchscreen_id: desktop_touchscreen
  thermostat_ui_desktop_timeout_enabled: 'true'
  thermostat_ui_desktop_timeout_duration: '4s'
  thermostat_ui_antiburn_enabled: 'false'
  thermostat_ui_antiburn_internal: 'true'
  thermostat_ui_has_backlight_light: 'false'
  thermostat_ui_time_id: sntp_time
  thermostat_ui_startup_page: loading_page

packages:
  thermostat-display-ui: !include packages/thermostat/display-ui.esp.yaml

esphome:
  name: ${name}
  on_boot:
    - priority: -100.0
      then:
        - script.execute: run_desktop_loading_timeout
        - script.execute: sync_active_setpoint_visuals
        - lvgl.page.show: ${thermostat_ui_startup_page}

host:

# WiFi not needed for host platform - uses computer's network automatically
# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password

api:
  # Required for Home Assistant integration
  # For host platform, manually add device in HA using your computer's IP:6053
  # Ensure firewall allows port 6053
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    then:
      - logger.log: "Home Assistant client connected!"
  on_client_disconnected:
    then:
      - logger.log: "Home Assistant client disconnected!"

logger:
  level: DEBUG

time:
  - platform: host
    id: sntp_time
    timezone: America/Toronto

display:
  - platform: sdl
    id: desktop_display
    dimensions:
      width: 480
      height: 480

output:
  - platform: template
    id: desktop_backlight_output
    type: float
    write_action:
      - lambda: |-
          // Desktop build has no physical backlight.

light:
  - platform: monochromatic
    id: display_backlight
    output: desktop_backlight_output
    internal: true

touchscreen:
  - platform: sdl
    id: desktop_touchscreen
    update_interval: 64ms  # Slightly slower to smooth drag processing
    on_release:
      then:
        - if:
            condition: lvgl.is_paused
            then:
              - logger.log:
                  level: DEBUG
                  format: "[idle] LVGL resuming"
              - lvgl.resume:
              - lvgl.widget.redraw:
        - if:
            condition:
              lambda: 'return id(switch_antiburn).state;'
            then:
              - switch.turn_off: switch_antiburn
