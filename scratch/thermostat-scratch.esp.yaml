substitutions:
  friendly_name: Theoretical Thermostat Scratch
  name: thermostat_climate_scratch

packages:
  esp32-base: !include packages/esp32-base.esp.yaml
  esp32s3-zero: !include packages/esp32s3-zero.esp.yaml

web_server:
  port: 80
  version: 3


binary_sensor:
  - platform: gpio
    pin:
      number: 1
      mode: INPUT_PULLDOWN
    name: "Yellow"
    id: yellow_input
  - platform: gpio
    pin:
      number: 2
      mode: INPUT_PULLDOWN
    name: "Green"
    id: green_input
  - platform: gpio
    pin:
      number: 3
      mode: INPUT_PULLDOWN
    name: "White"
    id: white_input

switch:
  - platform: gpio
    pin: 7
    name: "Green Output"
    id: green_output
